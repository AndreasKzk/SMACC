# SMACC - SMA Charge Control / SMA Akku Ladesteuerung
#
# GitHub-/Share-Version:
# - Diese Datei ist anonymisiert und enthaelt keine echten Seriennummern- oder Geraete-Entitaeten.
# - Alle sensor.smacc_* Platzhalter muessen vor produktivem Einsatz auf die eigenen Home-Assistant-Entitaeten gemappt werden.
# - Der Modbus-Hub smacc_sma_modbus sowie Slave-ID/Register muessen zum eigenen SMA-/Batterie-Setup passen.
# - Die Forecast-Beispiele gehen von drei PV-Forecast-Quellen/Flaechen aus und muessen ggf. angepasst werden.
# - Nutzung auf eigene Gefahr. Modbus-Schreibzugriffe koennen das Lade-/Entladeverhalten aktiv beeinflussen.

# SMA Akku Ladesteuerung - aktueller Stand
# Fokus:
# - nachvollziehbare Ladeentscheidung auf Basis von PV-Forecast, Hausverbrauch, SOC-Zielen und Zielzeit
# - Dynamik-Modus, Schonladen, Nachtziel, Morgen-Forecast, Balancing und Jetzt-laden
# - aktive CmpBMS-/Modbus-Steuerung mit Ladefreigabe, Ladesperre und Leistungsgrenzen
# - alle Helfer ohne initial: damit Werte über HA-Neustarts persistent bleiben


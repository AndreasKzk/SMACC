          value: >
            40793:0|40795:0|40797:0|40799:{{ states('sensor.sma_ev_akku_entladeleistung_ziel') | int(states('input_number.sma_akku_entladeleistung_max') | int(10600)) }}|40801:0|40236:2290


automation:
  - alias: SMA Akku CmpBMS Ladesteuerung dynamisch
    id: sma_akku_cmpbms_ladesteuerung_dynamisch
    mode: queued
    max: 10
    max_exceeded: silent
    trigger:
      - platform: homeassistant
        event: start
        id: start

      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.sma_akku_modbus_refresh
        id: timer

      # Sofort nur bei stabilen Steuergrößen.
      # Wichtig: kein Trigger auf Entscheidungstext, Ladestatus, Forecast-/Leistungswerte.
      - platform: state
        entity_id:
          - binary_sensor.sma_akku_laden_soll_erlaubt_sein
          - binary_sensor.sma_akku_pv_standby_aktiv
          - binary_sensor.sma_ev_akku_verriegelung_soll_aktiv_sein
          - sensor.smacc_battery_soc
          - sensor.sma_akku_aktuelles_ladeziel_soc
          - sensor.sma_akku_dynamisches_ziel_soc
          - sensor.sma_ev_akku_entladeleistung_ziel
        id: state

      - platform: state
        entity_id: sensor.sma_akku_akku_laedt_trotz_sperre
        to: "True"
        id: trotz_sperre

      - platform: state
        entity_id:
          - input_boolean.sma_akku_ladesteuerung_aktiv
          - input_boolean.sma_akku_ladephase_bis_ziel_aktiv
          - input_boolean.sma_akku_zielzeit_dynamisch_aktiv
          - input_boolean.sma_akku_nachtziel_aktiv
          - input_boolean.sma_akku_morgen_forecast_aktiv
          - input_boolean.sma_akku_balancing_100
          - input_boolean.sma_akku_balancing_woechentlich
          - input_select.sma_akku_balancing_wochentag
          - input_datetime.sma_akku_balancing_startzeit
          - input_number.sma_akku_balancing_min_restforecast_kwh
          - input_number.sma_akku_ziel_mittag
          - input_number.sma_akku_ziel_tagesende
          - input_number.sma_akku_ziel_hysterese
          - input_number.sma_akku_ladeleistung_max
          - input_number.sma_akku_entladeleistung_max
          - input_number.sma_akku_ladezeit_reserve_stunden
          - input_number.sma_akku_ladewirkungsgrad
          - input_number.sma_akku_kapazitaet_kwh
          - input_number.sma_akku_hausverbrauch_faktor
          - input_datetime.sma_akku_ladephase_fruehestens_zeit
          - input_datetime.sma_akku_ladephase_spaetestens_zeit
          - input_datetime.sma_akku_ziel_erreicht_zeit
          - input_number.sma_akku_zielzeit_sicherheitsreserve_minuten
          - input_number.sma_akku_zielzeit_puffer_vor_pv_ende_minuten
          - input_number.sma_akku_morgen_forecast_schwelle_mittel
          - input_number.sma_akku_morgen_forecast_schwelle_schlecht
          - input_number.sma_akku_ziel_morgen_mittel
          - input_number.sma_akku_ziel_morgen_schlecht
          - input_number.sma_akku_rest_soc_pv_start
          - input_number.sma_akku_nachtreserve_soc
          - input_number.sma_akku_nachtziel_min_soc
          - input_number.sma_akku_nachtziel_max_soc
          - input_number.sma_akku_nacht_soc_verlust_fallback
        id: helper

    condition:
      - condition: state
        entity_id: input_boolean.sma_akku_ladesteuerung_aktiv
        state: "on"

    action:
      - variables:
          trigger_art: "{{ trigger.id | default('unknown') }}"
          standby_aktiv: "{{ is_state('binary_sensor.sma_akku_pv_standby_aktiv', 'on') }}"
          laden_erlauben: "{{ is_state('binary_sensor.sma_akku_laden_soll_erlaubt_sein', 'on') }}"
          soc: "{{ states('sensor.smacc_battery_soc') | float(0) }}"
          ziel: "{{ states('sensor.sma_akku_aktuelles_ladeziel_soc') | float(40) }}"
          entscheidung: "{{ states('sensor.sma_akku_entscheidung_text') }}"
          letzter_status: "{{ states('input_text.sma_akku_ladestatus') }}"
          letztes_payload: "{{ states('input_text.sma_akku_cmpbms_payload_letzte') }}"
          cmpbms_ladeleistung: >
            {% if standby_aktiv or soc >= ziel or not laden_erlauben %}
              0
            {% else %}
              {{ states('input_number.sma_akku_ladeleistung_max') | int(10600) }}
            {% endif %}
          cmpbms_entladeleistung: "{{ states('sensor.sma_ev_akku_entladeleistung_ziel') | int(states('input_number.sma_akku_entladeleistung_max') | int(10600)) }}"
          cmpbms_freigabe_code: >
            {% if standby_aktiv or soc >= ziel or not laden_erlauben %}
              2290
            {% else %}
              1438
            {% endif %}
          sollstatus: >
            {% if standby_aktiv %}
              Standby
            {% elif soc >= ziel %}
              Laden gesperrt
            {% elif laden_erlauben %}
              Laden erlaubt
            {% else %}
              Laden gesperrt
            {% endif %}
          payload_soll: >
            40793:0|40795:{{ cmpbms_ladeleistung | trim }}|40797:0|40799:{{ cmpbms_entladeleistung }}|40801:0|40236:{{ cmpbms_freigabe_code | trim }}
          schreiben_erforderlich: >
            {{
              trigger_art in ['start', 'timer', 'trotz_sperre']
              or sollstatus != letzter_status
              or payload_soll | trim != letztes_payload | trim
            }}

      - choose:
          # Standby: ausdrücklich kein Modbus schreiben, Timer stoppen.
          - conditions:
              - condition: template
                value_template: "{{ standby_aktiv }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.sma_akku_ladephase_bis_ziel_aktiv
              - service: timer.cancel
                target:
                  entity_id: timer.sma_akku_modbus_refresh
              - service: input_text.set_value
                target:
                  entity_id: input_text.sma_akku_ladestatus
                data:
                  value: "Standby - kein Modbus"

          # Nur bei Start/Timer oder tatsächlichem Statuswechsel schreiben.
          - conditions:
              - condition: template
                value_template: "{{ schreiben_erforderlich }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ sollstatus == 'Laden erlaubt' }}"
                    sequence:
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: "{{ entscheidung == 'Zielzeit wird knapp - Ladephase starten' }}"
                            sequence:
                              - service: input_boolean.turn_on
                                target:
                                  entity_id: input_boolean.sma_akku_ladephase_bis_ziel_aktiv
                      - service: script.sma_akku_cmpbms_laden_erlauben
                      - service: timer.start
                        target:
                          entity_id: timer.sma_akku_modbus_refresh
                        data:
                          duration: "00:04:00"

                  - conditions:
                      - condition: template
                        value_template: "{{ sollstatus == 'Laden gesperrt' }}"
                    sequence:
                      - service: input_boolean.turn_off
                        target:
                          entity_id: input_boolean.sma_akku_ladephase_bis_ziel_aktiv
                      - service: script.sma_akku_cmpbms_laden_sperren
                      - service: timer.start
                        target:
                          entity_id: timer.sma_akku_modbus_refresh
                        data:
                          duration: "00:04:00"

        default: []

  - alias: SMA Akku Ziel erreicht hart sperren
    id: sma_akku_ziel_erreicht_hart_sperren
    mode: restart
    max_exceeded: silent
    trigger:
      - platform: state
        entity_id:
          - sensor.smacc_battery_soc
          - sensor.sma_akku_aktuelles_ladeziel_soc
          - sensor.sma_akku_dynamisches_ziel_soc
    condition:
      - condition: state
        entity_id: input_boolean.sma_akku_ladesteuerung_aktiv
        state: "on"
      - condition: state
        entity_id: binary_sensor.sma_akku_pv_standby_aktiv
        state: "off"
      - condition: template
        value_template: >
          {% set soc = states('sensor.smacc_battery_soc') | float(0) %}
          {% set ziel = states('sensor.sma_akku_aktuelles_ladeziel_soc') | float(40) %}
          {{ soc >= ziel }}
    action:
      # Kein direkter Modbus-Schreibzugriff mehr.
      # Die zentrale Modbus-Automation reagiert auf dieselbe SOC-/Zieländerung
      # und schreibt genau einmal, sofern der Sollstatus gewechselt hat.
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.sma_akku_ladephase_bis_ziel_aktiv

  - alias: SMA Akku PV Ende erkennen
    id: sma_akku_pv_ende_erkennen
    mode: single
    max_exceeded: silent
    trigger:
      - platform: template
        value_template: >
          {{
            states('sensor.smacc_pv_power_total') | float(0)
            < states('input_number.sma_akku_pv_ende_schwelle_w') | float(950)
          }}
        for:
          minutes: 10
    condition:
      - condition: time
        after: "15:00:00"
        before: "23:59:00"
    action:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.sma_akku_pv_ende_letzte
        data:
          datetime: "{{ (now() - timedelta(minutes=10)).strftime('%Y-%m-%d %H:%M:%S') }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.sma_akku_soc_bei_pv_ende
        data:
          value: "{{ states('sensor.smacc_battery_soc') | float(0) | round(1) }}"

  - alias: SMA Akku stabilen PV Start erkennen
    id: sma_akku_stabilen_pv_start_erkennen
    mode: single
    max_exceeded: silent
    trigger:
      - platform: template
        value_template: >
          {{
            states('sensor.smacc_pv_power_total') | float(0)
            > states('input_number.sma_akku_pv_stabil_schwelle_w') | float(800)
          }}
        for:
          minutes: 15
    condition:
      - condition: time
        after: "05:00:00"
        before: "13:00:00"
    action:
      - variables:
          soc_ende: "{{ states('input_number.sma_akku_soc_bei_pv_ende') | float(0) }}"
          soc_start: "{{ states('sensor.smacc_battery_soc') | float(0) }}"
          kapazitaet: "{{ states('input_number.sma_akku_kapazitaet_kwh') | float(12.8) }}"
          soc_verlust: "{{ [soc_ende - soc_start, 0] | max }}"
          kwh_verlust: "{{ (([soc_ende - soc_start, 0] | max) / 100 * kapazitaet) }}"
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.sma_akku_pv_start_stabil_letzte
        data:
          datetime: "{{ (now() - timedelta(minutes=15)).strftime('%Y-%m-%d %H:%M:%S') }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.sma_akku_soc_bei_pv_start_stabil
        data:
          value: "{{ soc_start | float(0) | round(1) }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.sma_akku_nacht_soc_verlust_letzte
        data:
          value: "{{ soc_verlust | float(0) | round(1) }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.sma_akku_nachtverbrauch_kwh_letzte
        data:
          value: "{{ kwh_verlust | float(0) | round(2) }}"

  - alias: SMA Akku Balancing woechentlich starten
    id: sma_akku_balancing_woechentlich_starten
    mode: single
    max_exceeded: silent
    trigger:
      - platform: time
        at: input_datetime.sma_akku_balancing_startzeit
    condition:
      - condition: state
        entity_id: input_boolean.sma_akku_ladesteuerung_aktiv
        state: "on"
      - condition: state
        entity_id: input_boolean.sma_akku_balancing_woechentlich
        state: "on"
      - condition: template
        value_template: >
          {% set tage = {
            'Montag': 0,
            'Dienstag': 1,
            'Mittwoch': 2,
            'Donnerstag': 3,
            'Freitag': 4,
            'Samstag': 5,
            'Sonntag': 6
          } %}
          {{ now().weekday() == tage.get(states('input_select.sma_akku_balancing_wochentag'), 6) }}
      - condition: template
        value_template: >
          {% set min_rest = states('input_number.sma_akku_balancing_min_restforecast_kwh') | float(0) %}
          {% set rest = states('sensor.sma_akku_nutzbarer_forecast_fuer_akku') | float(0) %}
          {{ min_rest <= 0 or rest >= min_rest }}
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.sma_akku_balancing_100
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.sma_akku_ladephase_bis_ziel_aktiv
      - service: input_text.set_value
        target:
          entity_id: input_text.sma_akku_ladestatus
        data:

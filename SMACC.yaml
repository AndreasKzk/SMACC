# SMACC – SMA Charge Control (anonymisierte Share-Version)
#
# WICHTIG:
# - Diese Datei ist absichtlich anonymisiert und NICHT direkt plug-and-play.
# - Alle externen Entitäten sind als generische Platzhalter benannt.
# - Vor Einsatz bitte auf die eigenen Entity-IDs, Forecast-Quellen, Modbus-Hub und Slave-ID mappen.
#
# Erwartete externe Platzhalter-Entitäten:
# - sensor.smacc_battery_soc
# - sensor.smacc_battery_charge_power
# - sensor.smacc_battery_discharge_power
# - sensor.smacc_grid_import_power
# - sensor.smacc_grid_export_power
# - sensor.smacc_pv_power_total
# - sensor.smacc_pv1_forecast_current_hour
# - sensor.smacc_pv1_forecast_next_hour
# - sensor.smacc_pv1_forecast_today_total
# - sensor.smacc_pv1_forecast_today_remaining
# - sensor.smacc_pv1_forecast_tomorrow_total
# - sensor.smacc_pv2_forecast_current_hour
# - sensor.smacc_pv2_forecast_next_hour
# - sensor.smacc_pv2_forecast_today_total
# - sensor.smacc_pv2_forecast_today_remaining
# - sensor.smacc_pv2_forecast_tomorrow_total
# - sensor.smacc_pv3_forecast_current_hour
# - sensor.smacc_pv3_forecast_next_hour
# - sensor.smacc_pv3_forecast_today_total
# - sensor.smacc_pv3_forecast_today_remaining
# - sensor.smacc_pv3_forecast_tomorrow_total
#
# Modbus-Platzhalter:
# - hub: smacc_modbus_hub
# - slave: 1  # Beispielwert, an eigenes Setup anpassen
#

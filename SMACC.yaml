  sma_akku_cmpbms_laden_erlauben:
    alias: SMA Akku CmpBMS Laden erlauben
    mode: single
    sequence:
      - service: modbus.write_register
        data:
          hub: smacc_modbus_hub
          slave: 1
          address: 40793
          value:
            - 0
            - 0
      - delay:
          milliseconds: 300
      - service: modbus.write_register
        data:
          hub: smacc_modbus_hub
          slave: 1
          address: 40795
          value:
            - 0
            - "{{ states('input_number.sma_akku_ladeleistung_max') | int(10600) }}"
      - delay:
          milliseconds: 300
      - service: modbus.write_register
        data:
          hub: smacc_modbus_hub
          slave: 1
          address: 40797
          value:
            - 0
            - 0
      - delay:
          milliseconds: 300
      - service: modbus.write_register
        data:
          hub: smacc_modbus_hub
          slave: 1
          address: 40799
          value:
            - 0
            - "{{ states('sensor.sma_ev_akku_entladeleistung_ziel') | int(states('input_number.sma_akku_entladeleistung_max') | int(10600)) }}"
      - delay:
          milliseconds: 300
      - service: modbus.write_register
        data:
          hub: smacc_modbus_hub
          slave: 1
          address: 40801
          value:
            - 0
            - 0
      - delay:
          milliseconds: 300
      - service: modbus.write_register
        data:
          hub: smacc_modbus_hub
          slave: 1
          address: 40236
          value:
            - 0
            - 1438
      - service: input_text.set_value
        target:
          entity_id: input_text.sma_akku_ladestatus
        data:
          value: "Laden erlaubt"
      - service: input_text.set_value
        target:
          entity_id: input_text.sma_akku_cmpbms_payload_letzte
        data:
          value: >
            40793:0|40795:{{ states('input_number.sma_akku_ladeleistung_max') | int(10600) }}|40797:0|40799:{{ states('sensor.sma_ev_akku_entladeleistung_ziel') | int(states('input_number.sma_akku_entladeleistung_max') | int(10600)) }}|40801:0|40236:1438

  sma_akku_cmpbms_laden_sperren:

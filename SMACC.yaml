          {% set soc = states('sensor.smacc_battery_soc') | float(0) %}
          {% set ziel = states('sensor.sma_akku_dynamisches_ziel_soc') | float(80) %}
          {% set benoetigt = states('sensor.sma_akku_benoetigte_ladezeit_bis_ziel') | float(99) %}
          {% set zielzeit_sensor = states('sensor.sma_akku_zielzeit_effektiv') %}
          {% set ab_str = states('input_datetime.sma_akku_ladephase_fruehestens_zeit') %}
          {% set bis_str = states('input_datetime.sma_akku_ladephase_spaetestens_zeit') %}
          {% set ladephase_ab = today_at(ab_str if ab_str not in ['unknown', 'unavailable', 'none', ''] else '11:00:00') %}
          {% set ladephase_bis = today_at(bis_str if bis_str not in ['unknown', 'unavailable', 'none', ''] else '20:00:00') %}
          {% if modus != 'Dynamik' %}
            {{ none }}
          {% elif zielzeit_sensor in ['unknown', 'unavailable', 'none', ''] or soc >= ziel or benoetigt <= 0 or benoetigt >= 99 %}
            {{ none }}
          {% else %}
            {% set zielzeit = as_datetime(zielzeit_sensor) %}
            {% set start = zielzeit - timedelta(hours=benoetigt) %}
            {% if start < ladephase_ab %}
              {{ ladephase_ab.isoformat() }}
            {% elif start > ladephase_bis %}
              {{ none }}
            {% else %}
              {{ start.isoformat() }}
            {% endif %}
          {% endif %}

      - name: SMA Akku Ladebeginn Wirksames Ziel
        unique_id: sma_akku_ladebeginn_wirksames_ziel
        device_class: timestamp
        icon: mdi:clock-start
        state: >
          {% set modus = states('input_select.sma_akku_betriebsmodus') %}
          {% set soc = states('sensor.smacc_battery_soc') | float(0) %}
          {% set ziel = states('sensor.sma_akku_dynamisches_ziel_soc') | float(80) %}
          {% set roh = states('sensor.sma_akku_ladebeginn_berechnet') %}
          {% set hart = states('sensor.sma_akku_ladebeginn_spaetestens_hart') %}
          {% set fixiert = states('input_datetime.sma_akku_ladebeginn_fixiert_zeit') %}
          {% set ab_str = states('input_datetime.sma_akku_ladephase_fruehestens_zeit') %}
          {% set ladephase_ab = today_at(ab_str if ab_str not in ['unknown', 'unavailable', 'none', ''] else '11:00:00') %}
          {% set roh_ok = roh not in ['unknown', 'unavailable', 'none', ''] %}
          {% set hart_ok = hart not in ['unknown', 'unavailable', 'none', ''] %}
          {% set fix_ok = fixiert not in ['unknown', 'unavailable', 'none', ''] %}
          {% set roh_dt = as_datetime(roh) if roh_ok else none %}
          {% set fix_heute =
            fix_ok
            and (as_timestamp(fixiert) | timestamp_custom('%Y-%m-%d', true)) == now().strftime('%Y-%m-%d')
            and as_timestamp(fixiert) >= as_timestamp(ladephase_ab)
          %}
          {% if modus != 'Dynamik' %}
            {{ none }}
          {% elif soc >= ziel %}
            {{ none }}
          {% elif fix_heute and hart_ok and as_timestamp(fixiert) > as_timestamp(hart) %}
            {{ as_datetime(hart).isoformat() }}
          {% elif fix_heute %}
            {{ today_at(as_timestamp(fixiert) | timestamp_custom('%H:%M:%S', true)).isoformat() }}
          {% elif roh_ok %}
            {{ roh_dt.isoformat() }}
          {% elif hart_ok %}
            {{ as_datetime(hart).isoformat() }}
          {% else %}
            {{ none }}
          {% endif %}


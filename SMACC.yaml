          milliseconds: 300
      - service: modbus.write_register
        data:
          hub: smacc_modbus_hub
          slave: 1
          address: 40795
          value:
            - 0
            - 0
      - delay:
          milliseconds: 300
      - service: modbus.write_register
        data:
          hub: smacc_modbus_hub
          slave: 1
          address: 40797
          value:
            - 0
            - 0
      - delay:
          milliseconds: 300
      - service: modbus.write_register
        data:
          hub: smacc_modbus_hub
          slave: 1
          address: 40799
          value:
            - 0
            - "{{ states('sensor.sma_ev_akku_entladeleistung_ziel') | int(states('input_number.sma_akku_entladeleistung_max') | int(10600)) }}"
      - delay:
          milliseconds: 300
      - service: modbus.write_register
        data:

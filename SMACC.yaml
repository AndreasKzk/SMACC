  - alias: SMA Akku Ladebeginn einrasten
    id: sma_akku_ladebeginn_einrasten
    mode: restart
    max_exceeded: silent
    trigger:
      - platform: homeassistant
        event: start

      - platform: state
        entity_id:
          - sensor.sma_akku_ladebeginn_berechnet
          - sensor.sma_akku_ladebeginn_spaetestens_hart
          - sensor.sma_akku_dynamisches_ziel_soc
          - sensor.smacc_battery_soc
          - input_boolean.sma_akku_ladesteuerung_aktiv
          - input_select.sma_akku_betriebsmodus
    condition:
      - condition: state
        entity_id: input_boolean.sma_akku_ladesteuerung_aktiv
        state: "on"
      - condition: state
        entity_id: input_select.sma_akku_betriebsmodus
        state: "Dynamik"
    action:
      - variables:
          roh: "{{ states('sensor.sma_akku_ladebeginn_berechnet') }}"
          hart: "{{ states('sensor.sma_akku_ladebeginn_spaetestens_hart') }}"
          fixiert: "{{ states('input_datetime.sma_akku_ladebeginn_fixiert_zeit') }}"
          ab_str: "{{ states('input_datetime.sma_akku_ladephase_fruehestens_zeit') }}"
          fix_heute: >
            {% if fixiert in ['unknown', 'unavailable', 'none', ''] %}
              false
            {% else %}
              {% set ladephase_ab = today_at(ab_str if ab_str not in ['unknown', 'unavailable', 'none', ''] else '11:00:00') %}
              {{
                (as_timestamp(fixiert) | timestamp_custom('%Y-%m-%d', true)) == now().strftime('%Y-%m-%d')
                and as_timestamp(fixiert) >= as_timestamp(ladephase_ab)
              }}
            {% endif %}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ fix_heute and hart not in ['unknown', 'unavailable', 'none', ''] and as_timestamp(fixiert) > as_timestamp(hart) }}"
            sequence:
              - service: input_datetime.set_datetime
                target:
                  entity_id: input_datetime.sma_akku_ladebeginn_fixiert_zeit
                data:
                  datetime: "{{ as_timestamp(hart) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}"

          - conditions:
              - condition: template
                value_template: "{{ roh not in ['unknown', 'unavailable', 'none', ''] and not fix_heute }}"
            sequence:
              - service: input_datetime.set_datetime
                target:
                  entity_id: input_datetime.sma_akku_ladebeginn_fixiert_zeit
                data:
                  datetime: "{{ as_timestamp(roh) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}"

  - alias: SMA Akku Ladebeginn frueher uebernehmen stabil
    id: sma_akku_ladebeginn_frueher_uebernehmen_stabil
    mode: restart
    max_exceeded: silent
    trigger:
      - platform: template
        value_template: >
          {% set roh = states('sensor.sma_akku_ladebeginn_berechnet') %}
          {% set fixiert = states('input_datetime.sma_akku_ladebeginn_fixiert_zeit') %}
          {% set ab_str = states('input_datetime.sma_akku_ladephase_fruehestens_zeit') %}
          {% set ladephase_ab = today_at(ab_str if ab_str not in ['unknown', 'unavailable', 'none', ''] else '11:00:00') %}
          {% set fix_heute =
            fixiert not in ['unknown', 'unavailable', 'none', '']
            and (as_timestamp(fixiert) | timestamp_custom('%Y-%m-%d', true)) == now().strftime('%Y-%m-%d')
            and as_timestamp(fixiert) >= as_timestamp(ladephase_ab)
          %}
          {{
            is_state('input_boolean.sma_akku_ladesteuerung_aktiv', 'on')
            and is_state('input_select.sma_akku_betriebsmodus', 'Dynamik')
            and roh not in ['unknown', 'unavailable', 'none', '']
            and fix_heute
            and (as_timestamp(roh) <= (as_timestamp(fixiert) - 15 * 60))
          }}
        for: "00:10:00"
    action:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.sma_akku_ladebeginn_fixiert_zeit
        data:
          datetime: "{{ as_timestamp(states('sensor.sma_akku_ladebeginn_berechnet')) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}"

  - alias: SMA Akku Ladebeginn spaeter uebernehmen stabil
    id: sma_akku_ladebeginn_spaeter_uebernehmen_stabil
    mode: restart
    max_exceeded: silent
    trigger:
      - platform: template
        value_template: >
          {% set roh = states('sensor.sma_akku_ladebeginn_berechnet') %}
          {% set fixiert = states('input_datetime.sma_akku_ladebeginn_fixiert_zeit') %}
          {% set ab_str = states('input_datetime.sma_akku_ladephase_fruehestens_zeit') %}
          {% set ladephase_ab = today_at(ab_str if ab_str not in ['unknown', 'unavailable', 'none', ''] else '11:00:00') %}
          {% set fix_heute =
            fixiert not in ['unknown', 'unavailable', 'none', '']
            and (as_timestamp(fixiert) | timestamp_custom('%Y-%m-%d', true)) == now().strftime('%Y-%m-%d')
            and as_timestamp(fixiert) >= as_timestamp(ladephase_ab)
          %}
          {{
            is_state('input_boolean.sma_akku_ladesteuerung_aktiv', 'on')
            and is_state('input_select.sma_akku_betriebsmodus', 'Dynamik')
            and roh not in ['unknown', 'unavailable', 'none', '']
            and fix_heute
            and (as_timestamp(roh) >= (as_timestamp(fixiert) + 20 * 60))
          }}
        for: "00:15:00"
    action:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.sma_akku_ladebeginn_fixiert_zeit
        data:
          datetime: "{{ as_timestamp(states('sensor.sma_akku_ladebeginn_berechnet')) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}"

  - alias: SMA Akku Ladebeginn Fixierung nachts zuruecksetzen
    id: sma_akku_ladebeginn_fixierung_nachts_zuruecksetzen
    mode: single
    max_exceeded: silent
    trigger:
      - platform: time
        at: "00:05:00"
    action:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.sma_akku_ladebeginn_fixiert_zeit
        data:
          datetime: "2000-01-01 00:00:00"

  - alias: SMA Akku Ziel erreicht hart sperren
    id: sma_akku_ziel_erreicht_hart_sperren
    mode: restart
    max_exceeded: silent
    trigger:
      - platform: state
        entity_id:
          - sensor.smacc_battery_soc
          - sensor.sma_akku_aktuelles_ladeziel_soc
          - sensor.sma_akku_dynamisches_ziel_soc
    condition:
      - condition: state
        entity_id: input_boolean.sma_akku_ladesteuerung_aktiv
        state: "on"
      - condition: state
        entity_id: binary_sensor.sma_akku_pv_standby_aktiv
        state: "off"
      - condition: template
        value_template: >
          {% set tage = {
            'Montag': 0,
            'Dienstag': 1,
            'Mittwoch': 2,
            'Donnerstag': 3,
            'Freitag': 4,
            'Samstag': 5,
            'Sonntag': 6
          } %}
          {{
            not (
              is_state('input_boolean.sma_akku_balancing_100', 'on')
              and now().weekday() == tage.get(states('input_select.sma_akku_balancing_wochentag'), 6)
            )
          }}
      - condition: template
        value_template: >
          {% set soc = states('sensor.smacc_battery_soc') | float(0) %}
          {% set ziel = states('sensor.sma_akku_aktuelles_ladeziel_soc') | float(40) %}
          {% set jetzt_laden_aktiv = is_state('input_boolean.sma_akku_jetzt_laden_aktiv', 'on') %}
          {{ soc >= ziel and (ziel < 100 or jetzt_laden_aktiv) }}
    action:
      # Kein direkter Modbus-Schreibzugriff mehr.
      # Die zentrale Modbus-Automation reagiert auf dieselbe SOC-/Zieländerung
      # und schreibt genau einmal, sofern der Sollstatus gewechselt hat.
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.sma_akku_jetzt_laden_aktiv
      - service: input_number.set_value
        target:
          entity_id: input_number.sma_akku_jetzt_laden_ziel_soc
        data:
          value: 0
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.sma_akku_ladephase_bis_ziel_aktiv
      - service: input_number.set_value
        target:
          entity_id: input_number.sma_akku_ladephase_ziel_soc
        data:
          value: 0

  - alias: SMA Akku PV Ende erkennen
    id: sma_akku_pv_ende_erkennen
    mode: single
    max_exceeded: silent
    trigger:
      - platform: template
        value_template: >
          {{
            states('sensor.smacc_pv_power_total') | float(0)
            < states('input_number.sma_akku_pv_ende_schwelle_w') | float(950)
          }}
        for:
          minutes: 10
    condition:
      - condition: time
        after: "15:00:00"
        before: "23:59:00"
    action:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.sma_akku_pv_ende_letzte
        data:
          datetime: "{{ (now() - timedelta(minutes=10)).strftime('%Y-%m-%d %H:%M:%S') }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.sma_akku_soc_bei_pv_ende
        data:
          value: "{{ states('sensor.smacc_battery_soc') | float(0) | round(1) }}"

  - alias: SMA Akku stabilen PV Start erkennen
    id: sma_akku_stabilen_pv_start_erkennen
    mode: single
    max_exceeded: silent
    trigger:
      - platform: template
        value_template: >
          {{
            states('sensor.smacc_pv_power_total') | float(0)
            > states('input_number.sma_akku_pv_stabil_schwelle_w') | float(800)
          }}
        for:
          minutes: 15
    condition:
      - condition: time
        after: "05:00:00"
        before: "13:00:00"
    action:
      - variables:
          soc_ende: "{{ states('input_number.sma_akku_soc_bei_pv_ende') | float(0) }}"
          soc_start: "{{ states('sensor.smacc_battery_soc') | float(0) }}"
          kapazitaet: "{{ states('input_number.sma_akku_kapazitaet_kwh') | float(12.8) }}"
          soc_verlust: "{{ [soc_ende - soc_start, 0] | max }}"
          kwh_verlust: "{{ (([soc_ende - soc_start, 0] | max) / 100 * kapazitaet) }}"
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.sma_akku_pv_start_stabil_letzte
        data:
          datetime: "{{ (now() - timedelta(minutes=15)).strftime('%Y-%m-%d %H:%M:%S') }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.sma_akku_soc_bei_pv_start_stabil
        data:
          value: "{{ soc_start | float(0) | round(1) }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.sma_akku_nacht_soc_verlust_letzte
        data:
          value: "{{ soc_verlust | float(0) | round(1) }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.sma_akku_nachtverbrauch_kwh_letzte
        data:
          value: "{{ kwh_verlust | float(0) | round(2) }}"

  - alias: SMA Akku Balancing woechentlich starten
    id: sma_akku_balancing_woechentlich_starten
    mode: single
    max_exceeded: silent
    trigger:
      - platform: time
        at: input_datetime.sma_akku_balancing_startzeit
    condition:
      - condition: state
        entity_id: input_boolean.sma_akku_ladesteuerung_aktiv
        state: "on"
      - condition: state
        entity_id: input_boolean.sma_akku_balancing_woechentlich
        state: "on"
      - condition: template
        value_template: >
          {% set tage = {
            'Montag': 0,
            'Dienstag': 1,
            'Mittwoch': 2,
            'Donnerstag': 3,
            'Freitag': 4,
            'Samstag': 5,
            'Sonntag': 6
          } %}
          {{ now().weekday() == tage.get(states('input_select.sma_akku_balancing_wochentag'), 6) }}
      - condition: template
        value_template: >
          {% set min_rest = states('input_number.sma_akku_balancing_min_restforecast_kwh') | float(0) %}
          {% set rest = states('sensor.sma_akku_nutzbarer_forecast_fuer_akku') | float(0) %}
          {{ min_rest <= 0 or rest >= min_rest }}
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.sma_akku_balancing_100
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.sma_akku_ladephase_bis_ziel_aktiv
      - service: input_number.set_value
        target:
          entity_id: input_number.sma_akku_ladephase_ziel_soc
        data:
          value: 100
      - service: input_text.set_value
        target:
          entity_id: input_text.sma_akku_ladestatus
        data:
          value: "Woechentliches Balancing gestartet - Ziel 100 Prozent"

  - alias: SMA Akku Balancing automatisch beenden
    id: sma_akku_balancing_automatisch_beenden
    mode: single
    max_exceeded: silent
    trigger:
      - platform: numeric_state
        entity_id: sensor.smacc_battery_soc
        above: 99.4
    condition:
      - condition: state
        entity_id: input_boolean.sma_akku_balancing_100
        state: "on"
      - condition: template
        value_template: >
          {% set tage = {
            'Montag': 0,
            'Dienstag': 1,
            'Mittwoch': 2,
            'Donnerstag': 3,
            'Freitag': 4,
            'Samstag': 5,
            'Sonntag': 6
          } %}
          {{
            not (
              now().weekday() == tage.get(states('input_select.sma_akku_balancing_wochentag'), 6)
            )
          }}
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.sma_akku_balancing_100
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.sma_akku_ladephase_bis_ziel_aktiv
      - service: input_number.set_value
        target:
          entity_id: input_number.sma_akku_ladephase_ziel_soc
        data:
          value: 0
      - service: input_text.set_value
        target:
          entity_id: input_text.sma_akku_ladestatus
        data:
          value: "Balancing erreicht - Ziel neu prüfen"

  - alias: SMA Akku Balancing Folgetag beenden
    id: sma_akku_balancing_folgetag_beenden
    mode: single
    max_exceeded: silent
    trigger:
      - platform: time
        at: "00:05:00"
    condition:
      - condition: state
        entity_id: input_boolean.sma_akku_balancing_100
        state: "on"
      - condition: state
        entity_id: input_boolean.sma_akku_balancing_woechentlich
        state: "on"
      - condition: template
        value_template: >
          {% set tage = {
            'Montag': 0,
            'Dienstag': 1,
            'Mittwoch': 2,
            'Donnerstag': 3,
            'Freitag': 4,
            'Samstag': 5,
            'Sonntag': 6
          } %}
          {% set configured = tage.get(states('input_select.sma_akku_balancing_wochentag'), 6) %}
          {{ ((now().weekday() - 1) % 7) == configured }}
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.sma_akku_balancing_100
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.sma_akku_ladephase_bis_ziel_aktiv
      - service: input_number.set_value
        target:
          entity_id: input_number.sma_akku_ladephase_ziel_soc
        data:
          value: 0
      - service: input_text.set_value
        target:
          entity_id: input_text.sma_akku_ladestatus
        data:
          value: "Balancing beendet - Regelung wieder aktiv"

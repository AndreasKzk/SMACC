          {% else %}
            Kein Ladebeginn nötig
          {% endif %}

      - name: SMA Akku Aktuelles Ladeziel SOC
        unique_id: sma_akku_aktuelles_ladeziel_soc
        unit_of_measurement: "%"
        icon: mdi:battery-arrow-up
        state: >
          {% set modus = states('input_select.sma_akku_betriebsmodus') %}
          {% set soc = states('sensor.smacc_battery_soc') | float(0) %}
          {% set ziel_mittag = states('input_number.sma_akku_ziel_mittag') | float(40) %}
          {% set ziel = states('sensor.sma_akku_modus_basis_ziel_soc') | float(80) %}
          {% set ladephase_ziel = states('input_number.sma_akku_ladephase_ziel_soc') | float(0) %}
          {% set jetzt_laden_aktiv = is_state('input_boolean.sma_akku_jetzt_laden_aktiv', 'on') %}
          {% set jetzt_laden_ziel = states('input_number.sma_akku_jetzt_laden_ziel_soc') | float(0) %}
          {% set ladebeginn = states('sensor.sma_akku_ladebeginn_wirksames_ziel') %}
          {% set bis_str = states('input_datetime.sma_akku_ladephase_spaetestens_zeit') %}
          {% set ladephase_bis = today_at(bis_str if bis_str not in ['unknown', 'unavailable', 'none', ''] else '20:00:00') %}
          {% set nachtfenster = now() >= ladephase_bis or now() < today_at('05:00:00') %}
          {% set ladephase_eingerastet =
            modus == 'Dynamik'
            and
            is_state('input_boolean.sma_akku_ladephase_bis_ziel_aktiv', 'on')
            and ladephase_ziel > 0
            and soc < ladephase_ziel
          %}
          {% if is_state('input_boolean.sma_akku_balancing_100', 'on') %}
            100
          {% elif jetzt_laden_aktiv and jetzt_laden_ziel > 0 %}
            {{ jetzt_laden_ziel | round(0) }}
          {% elif ladephase_eingerastet %}
            {{ ladephase_ziel | round(0) }}
          {% elif modus == 'Schonladen' %}
            {{ ziel | round(0) }}
          {% elif ladebeginn not in ['unknown', 'unavailable', 'none', ''] and now() >= as_datetime(ladebeginn) %}
            {{ ziel | round(0) }}
          {% elif nachtfenster %}
            {{ ziel | round(0) }}
          {% else %}
            {{ ziel_mittag | round(0) }}
          {% endif %}

      - name: SMA Akku Aktuelles Ladeziel Grund
        unique_id: sma_akku_aktuelles_ladeziel_grund
        icon: mdi:comment-question
        state: >
          {% set modus = states('input_select.sma_akku_betriebsmodus') %}
          {% set soc = states('sensor.smacc_battery_soc') | float(0) %}
          {% set ziel = states('sensor.sma_akku_modus_basis_ziel_soc') | float(80) %}
          {% set ziel_mittag = states('input_number.sma_akku_ziel_mittag') | float(40) %}
          {% set ladephase_ziel = states('input_number.sma_akku_ladephase_ziel_soc') | float(0) %}
          {% set jetzt_laden_aktiv = is_state('input_boolean.sma_akku_jetzt_laden_aktiv', 'on') %}
          {% set jetzt_laden_ziel = states('input_number.sma_akku_jetzt_laden_ziel_soc') | float(0) %}
          {% set ladebeginn = states('sensor.sma_akku_ladebeginn_wirksames_ziel') %}
          {% set bis_str = states('input_datetime.sma_akku_ladephase_spaetestens_zeit') %}
          {% set ladephase_bis = today_at(bis_str if bis_str not in ['unknown', 'unavailable', 'none', ''] else '20:00:00') %}
          {% set nachtfenster = now() >= ladephase_bis or now() < today_at('05:00:00') %}
          {% set ladephase_eingerastet =
            modus == 'Dynamik'
            and
            is_state('input_boolean.sma_akku_ladephase_bis_ziel_aktiv', 'on')
            and ladephase_ziel > 0
            and soc < ladephase_ziel
          %}
          {% if is_state('input_boolean.sma_akku_balancing_100', 'on') %}
            Balancing aktiv
          {% elif jetzt_laden_aktiv and jetzt_laden_ziel > 0 %}
            Manuell jetzt laden aktiv
          {% elif ladephase_eingerastet %}
            Ladephase bis Ziel aktiv ({{ ladephase_ziel | round(0) }} %)
          {% elif modus == 'Schonladen' %}
            Schonladen festes Ziel
          {% elif ladebeginn not in ['unknown', 'unavailable', 'none', ''] and now() >= as_datetime(ladebeginn) %}
            Geplanter Ladebeginn erreicht
          {% elif nachtfenster %}
            Nachtfenster
          {% else %}
            Vor Ziel-Ladebeginn - nur Mittagsziel
          {% endif %}

      - name: SMA Akku Aktuelles Ladeziel Text
        unique_id: sma_akku_aktuelles_ladeziel_text
        icon: mdi:battery-arrow-up
        state: >
          {% set modus = states('input_select.sma_akku_betriebsmodus') %}
          {% set ziel = states('sensor.sma_akku_aktuelles_ladeziel_soc') %}
          {% set ziel_mittag = states('input_number.sma_akku_ziel_mittag') | float(40) %}
          {% set grund = states('sensor.sma_akku_aktuelles_ladeziel_grund') %}
          {% if ziel in ['unknown', 'unavailable', 'none', ''] %}
            Nicht berechenbar
          {% elif modus == 'Schonladen' %}
            Schonladenziel: {{ ziel }} %
          {% elif ziel | float(0) <= ziel_mittag %}
            Mittagsziel: {{ ziel }} %
          {% else %}
            Wirksames Ziel: {{ ziel }} % - {{ grund }}
          {% endif %}

      - name: SMA Akku Ladebeginn Prognose
        unique_id: sma_akku_ladebeginn_prognose
        device_class: timestamp
        icon: mdi:clock-start
        state: >
          {% set ziel = states('sensor.sma_akku_aktuelles_ladeziel_soc') | float(40) %}
          {% set soc = states('sensor.smacc_battery_soc') | float(0) %}
          {% set ts = states('sensor.sma_akku_ladebeginn_wirksames_ziel') %}
          {% if soc >= ziel %}
            {{ none }}
          {% elif ts in ['unknown', 'unavailable', 'none', ''] %}
            {{ none }}
          {% else %}
            {{ ts }}
          {% endif %}

      - name: SMA Akku Ladebeginn Prognose Text
        unique_id: sma_akku_ladebeginn_prognose_text
        icon: mdi:clock-start
        state: >
          {% set modus = states('input_select.sma_akku_betriebsmodus') %}
          {% set entscheidung = states('sensor.sma_akku_entscheidung_text') %}
          {% set ts = states('sensor.sma_akku_ladebeginn_prognose') %}
          {% if modus == 'Schonladen' %}
            Schonladen aktiv - kein geplanter Ladebeginn
          {% elif entscheidung in ['Unter Mittagsziel - Laden erlauben', 'Nachtfenster - Laden erlauben ohne Ladephase', 'Ladephase aktiv - Laden bis Ziel', 'Zielzeit wird knapp - Ladephase starten', 'Manuell jetzt laden - bis Ziel'] %}
            Jetzt laden - {{ entscheidung }}
          {% elif ts not in ['unknown', 'unavailable', 'none', ''] %}
            Geplant um {{ as_timestamp(ts) | timestamp_custom('%H:%M Uhr', true) }}
          {% elif entscheidung == 'Ziel erreicht - Laden sperren' %}
            Ziel erreicht - kein Ladebeginn geplant
          {% else %}
            {{ states('sensor.sma_akku_ladebeginn_wirksames_ziel_text') }}
          {% endif %}

      - name: SMA Akku Ladebeginn Uhrzeit
        unique_id: sma_akku_ladebeginn_uhrzeit
        icon: mdi:clock-start
        state: >
          {% set ts = states('sensor.sma_akku_ladebeginn_prognose') %}
          {% if ts in ['unknown', 'unavailable', 'none', ''] %}
            -
          {% else %}
            {{ as_timestamp(ts) | timestamp_custom('%H:%M Uhr', true) }}
          {% endif %}

      - name: SMA Akku Ladebeginn in Minuten
        unique_id: sma_akku_ladebeginn_in_minuten
        unit_of_measurement: "min"
        icon: mdi:timer-outline
        state: >
          {% set ts = states('sensor.sma_akku_ladebeginn_prognose') %}
          {% if ts in ['unknown', 'unavailable', 'none', ''] %}
            0
          {% else %}
            {{ [((as_timestamp(ts) - as_timestamp(now())) / 60), 0] | max | round(0) }}
          {% endif %}

      - name: SMA Akku Ziel erreicht Sperre aktiv
        unique_id: sma_akku_ziel_erreicht_sperre_aktiv
        icon: mdi:battery-lock
        state: >
          {% set soc = states('sensor.smacc_battery_soc') | float(0) %}
          {% set ziel = states('sensor.sma_akku_aktuelles_ladeziel_soc') | float(40) %}
          {{ soc >= ziel and ziel < 100 }}

      - name: SMA Akku Akku laedt trotz Sperre
        unique_id: sma_akku_akku_ladt_trotz_sperre
        icon: mdi:alert-circle
        state: >
          {% set soc = states('sensor.smacc_battery_soc') | float(0) %}
          {% set ziel = states('sensor.sma_akku_aktuelles_ladeziel_soc') | float(40) %}
          {% set charge = states('sensor.smacc_battery_charge_power') | float(0) %}
          {{ ziel < 100 and soc >= ziel and charge > 100 }}

      - name: SMA Akku Balancing Status
        unique_id: sma_akku_balancing_status
        icon: mdi:battery-sync
        state: >
          {% if is_state('input_boolean.sma_akku_balancing_100', 'on') %}
            Balancing aktiv - Ziel 100 %
          {% elif is_state('input_boolean.sma_akku_balancing_woechentlich', 'on') %}
            Automatisch geplant: {{ states('input_select.sma_akku_balancing_wochentag') }} um {{ states('input_datetime.sma_akku_balancing_startzeit') }}
          {% else %}
            Balancing aus
          {% endif %}

      - name: SMA Akku Entscheidung Text
        unique_id: sma_akku_entscheidung_text
        icon: mdi:text-box-check
        state: >
          {% set modus = states('input_select.sma_akku_betriebsmodus') %}
          {% set soc = states('sensor.smacc_battery_soc') | float(0) %}
          {% set ziel = states('sensor.sma_akku_aktuelles_ladeziel_soc') | float(40) %}
          {% set ziel_mittag = states('input_number.sma_akku_ziel_mittag') | float(40) %}
          {% set hysterese = states('input_number.sma_akku_ziel_hysterese') | float(1) %}
          {% set freigabegrenze = [ziel - hysterese, 0] | max %}
          {% set ladephase_ziel = states('input_number.sma_akku_ladephase_ziel_soc') | float(0) %}
          {% set jetzt_laden_aktiv = is_state('input_boolean.sma_akku_jetzt_laden_aktiv', 'on') %}
          {% set jetzt_laden_ziel = states('input_number.sma_akku_jetzt_laden_ziel_soc') | float(0) %}
          {% set ladebeginn = states('sensor.sma_akku_ladebeginn_wirksames_ziel') %}
          {% set bis_str = states('input_datetime.sma_akku_ladephase_spaetestens_zeit') %}
          {% set ladephase_bis = today_at(bis_str if bis_str not in ['unknown', 'unavailable', 'none', ''] else '20:00:00') %}
          {% set nachtfenster = now() >= ladephase_bis or now() < today_at('05:00:00') %}
          {% set standby = is_state('binary_sensor.sma_akku_pv_standby_aktiv', 'on') %}
          {% set letzter_status = states('input_text.sma_akku_ladestatus') %}
          {% set laden_war_erlaubt = letzter_status in ['Laden erlaubt', 'Ladephase aktiv - Laden bis Ziel', 'Schonladen - Laden bis Ziel', 'Ziel 100 % - kein Eingriff'] %}
          {% set sperre_halten = (not laden_war_erlaubt) and soc > freigabegrenze and soc < ziel %}
          {% set ladephase_eingerastet =
            modus == 'Dynamik'
            and
            is_state('input_boolean.sma_akku_ladephase_bis_ziel_aktiv', 'on')
            and ladephase_ziel > 0
            and soc < ladephase_ziel
          %}
          {% set tage = {
            'Montag': 0,
            'Dienstag': 1,
            'Mittwoch': 2,
            'Donnerstag': 3,
            'Freitag': 4,
            'Samstag': 5,
            'Sonntag': 6
          } %}
          {% set balancing_tag_ohne_eingriff =
            is_state('input_boolean.sma_akku_balancing_100', 'on')
            and now().weekday() == tage.get(states('input_select.sma_akku_balancing_wochentag'), 6)
          %}
          {% if standby %}
            PV-Standby - keine Ladeoptimierung
          {% elif balancing_tag_ohne_eingriff %}
            Balancing-Tag - kein Eingriff
          {% elif jetzt_laden_aktiv and jetzt_laden_ziel > 0 and soc < ziel %}
            Manuell jetzt laden - bis Ziel
          {% elif ladephase_eingerastet %}
            Ladephase aktiv - Laden bis Ziel
          {% elif ziel >= 100 and soc >= ziel %}
            Ziel 100 % - kein Eingriff
          {% elif soc >= ziel %}
            Ziel erreicht - Laden sperren
          {% elif sperre_halten %}
            Innerhalb Hysterese - Laden gesperrt halten
          {% elif modus == 'Schonladen' %}
            Schonladen - Laden bis Ziel
          {% elif ziel <= ziel_mittag %}
            Unter Mittagsziel - Laden erlauben
          {% elif nachtfenster %}
            Nachtfenster - Laden erlauben ohne Ladephase
          {% elif ladebeginn not in ['unknown', 'unavailable', 'none', ''] and now() >= as_datetime(ladebeginn) %}
            Zielzeit wird knapp - Ladephase starten
          {% else %}
            Zielzeit komfortabel - Laden verzögern
          {% endif %}

  - binary_sensor:
      - name: SMA Akku Ladezeit reicht noch
        unique_id: sma_akku_ladezeit_reicht_noch
        icon: mdi:clock-check
        state: >
          {% set ts = states('sensor.sma_akku_ladebeginn_wirksames_ziel') %}
          {{ ts not in ['unknown', 'unavailable', 'none', ''] and now() < as_datetime(ts) }}

      - name: SMA Akku Laden soll erlaubt sein
        unique_id: sma_akku_laden_soll_erlaubt_sein
        icon: mdi:battery-charging
        state: >
          {% set entscheidung = states('sensor.sma_akku_entscheidung_text') %}
          {{ entscheidung in ['Unter Mittagsziel - Laden erlauben', 'Nachtfenster - Laden erlauben ohne Ladephase', 'Ladephase aktiv - Laden bis Ziel', 'Zielzeit wird knapp - Ladephase starten', 'Manuell jetzt laden - bis Ziel', 'Ziel 100 % - kein Eingriff', 'Schonladen - Laden bis Ziel'] }}

      - name: SMA Akku PV Standby aktiv
        unique_id: sma_akku_pv_standby_aktiv
        icon: mdi:power-sleep
        delay_on:
          minutes: 10
        delay_off:
          minutes: 5
        state: >
          {% set pv = states('sensor.smacc_pv_power_total') | float(0) %}
          {% set schwelle = states('input_number.sma_akku_standby_pv_schwelle_w') | float(50) %}
          {{ pv <= schwelle }}

      - name: SMA Akku Schonladen Spannungsbremse aktiv
        unique_id: sma_akku_schonladen_spannungsbremse_aktiv
        icon: mdi:battery-minus-outline
        state: >
          {% set max_helper = states('input_number.sma_akku_schonladen_ladeleistung_max') | float(0) %}
          {% set max_ladung = max_helper if max_helper > 0 else states('input_number.sma_akku_ladeleistung_max') | float(10600) %}
          {% set grenze = states('sensor.sma_akku_schonladen_ladegrenze_aktiv') | float(max_ladung) %}
          {{ grenze < (max_ladung - 50) }}


script:
  sma_akku_diagnose_anzeigen:
    alias: SMA Akku Diagnose anzeigen
    mode: single
    sequence:
      - service: persistent_notification.create
        data:
          title: "SMA Akku Diagnose"
          notification_id: "sma_akku_diagnose"
          message: >
            ## Status

            Zeitpunkt: {{ now().strftime('%d.%m.%Y %H:%M:%S') }}

            Entscheidung: {{ states('sensor.sma_akku_entscheidung_text') }}

            Laden soll erlaubt sein: {{ states('binary_sensor.sma_akku_laden_soll_erlaubt_sein') }}

            Ladezeit reicht noch: {{ states('binary_sensor.sma_akku_ladezeit_reicht_noch') }}

            PV-Standby aktiv: {{ states('binary_sensor.sma_akku_pv_standby_aktiv') }}

            Ladephase bis Ziel aktiv: {{ states('input_boolean.sma_akku_ladephase_bis_ziel_aktiv') }}

            Ladestatus: {{ states('input_text.sma_akku_ladestatus') }}

            Ziel-erreicht-Sperre aktiv: {{ states('sensor.sma_akku_ziel_erreicht_sperre_aktiv') }}

            Akku laedt trotz Sperre: {{ states('sensor.sma_akku_akku_ladt_trotz_sperre') }}

            Akku Ladeleistung aktuell: {{ states('sensor.smacc_battery_charge_power') }} W


            ## Ladebeginn / Zielzeit

            Prognose Text: {{ states('sensor.sma_akku_ladebeginn_prognose_text') }}

            Ladebeginn Uhrzeit: {{ states('sensor.sma_akku_ladebeginn_uhrzeit') }}

            Ladebeginn Berechnet: {{ states('sensor.sma_akku_ladebeginn_berechnet') }}

            Ladebeginn Spaetestens Hart: {{ states('sensor.sma_akku_ladebeginn_spaetestens_hart') }}

            Ladebeginn Fixiert: {{ states('input_datetime.sma_akku_ladebeginn_fixiert_zeit') }}

            Ladebeginn Wirksames Ziel: {{ states('sensor.sma_akku_ladebeginn_wirksames_ziel_text') }}

            Ladebeginn Minuten: {{ states('sensor.sma_akku_ladebeginn_in_minuten') }}

            Ladefenster frühestens ab: {{ states('input_datetime.sma_akku_ladephase_fruehestens_zeit') }}

            Ladefenster spätestens bis: {{ states('input_datetime.sma_akku_ladephase_spaetestens_zeit') }}

            Ziel-SOC erreicht bis manuell: {{ states('input_datetime.sma_akku_ziel_erreicht_zeit') }}

            Zielzeit dynamisch aktiv: {{ states('input_boolean.sma_akku_zielzeit_dynamisch_aktiv') }}

            Effektive Zielzeit: {{ states('sensor.sma_akku_zielzeit_effektiv_text') }}

            Zielzeit Puffer vor PV-Ende: {{ states('input_number.sma_akku_zielzeit_puffer_vor_pv_ende_minuten') }} min

            Zielzeit Sicherheitsreserve: {{ states('input_number.sma_akku_zielzeit_sicherheitsreserve_minuten') }} min

            Letztes PV-Ende: {{ states('input_datetime.sma_akku_pv_ende_letzte') }}

            PV-Ende Schwelle: {{ states('input_number.sma_akku_pv_ende_schwelle_w') }} W


            ## Akku / Ziel

            Betriebsmodus: {{ states('input_select.sma_akku_betriebsmodus') }}

            SOC aktuell: {{ states('sensor.smacc_battery_soc') }} %

            Aktuelles Ladeziel-SOC: {{ states('sensor.sma_akku_aktuelles_ladeziel_soc') }} %

            Aktuelles Ladeziel: {{ states('sensor.sma_akku_aktuelles_ladeziel_text') }}

            Aktuelles Ladeziel Grund: {{ states('sensor.sma_akku_aktuelles_ladeziel_grund') }}

            Modus Basis Ziel-SOC: {{ states('sensor.sma_akku_modus_basis_ziel_soc') }} %

            Wirksames Ziel-SOC: {{ states('sensor.sma_akku_dynamisches_ziel_soc') }} %

            Ziel Mittag: {{ states('input_number.sma_akku_ziel_mittag') }} %

            Ziel Tagesende: {{ states('input_number.sma_akku_ziel_tagesende') }} %

            Schonladen Ziel-SOC: {{ states('input_number.sma_akku_schonladen_ziel_soc') }} %

            Schonladen Max-Ladeleistung: {{ states('input_number.sma_akku_schonladen_ladeleistung_max') }} W

            Schonladen Start-Spannung: {{ states('input_number.sma_akku_schonladen_spannung_start_mv') }} mV

            Schonladen Reset-Spannung: {{ states('input_number.sma_akku_schonladen_spannung_reset_mv') }} mV

            Schonladen minimaler C-Faktor: {{ states('input_number.sma_akku_schonladen_c_obenrum') }}

            Schonladen Minimalleistung: {{ states('sensor.sma_akku_schonladen_ladeleistung_obenrum') }} W

            Schonladen maximale Zellspannung: {{ states('sensor.sma_akku_schonladen_maximale_zellspannung') }} V

            Schonladen Ladegrenze aktiv: {{ states('sensor.sma_akku_schonladen_ladegrenze_aktiv') }} W

            Schonladen Spannungsbremse aktiv: {{ states('binary_sensor.sma_akku_schonladen_spannungsbremse_aktiv') }}

            Schonladen Status: {{ states('sensor.sma_akku_schonladen_status') }}

            Schonladen Ladeleistung wirksam: {{ states('sensor.sma_akku_schonladen_ladeleistung_wirksam') }} W

            Wirksame Ladeleistung Max: {{ states('sensor.sma_akku_wirksame_ladeleistung_max') }} W

            Fehlende Energie bis Ziel: {{ states('sensor.sma_akku_fehlende_energie_bis_ziel') }} kWh

            Benötigte Ladezeit bis Ziel: {{ states('sensor.sma_akku_benoetigte_ladezeit_bis_ziel') }} h


            ## Forecast / Verbrauch

            PV-Produktion aktuell: {{ states('sensor.smacc_pv_power_total') }} W

            Forecast Resttag gesamt: {{ states('sensor.sma_akku_pv_forecast_resttag_gesamt') }} kWh

            Forecast 2h gesamt: {{ states('sensor.sma_akku_pv_forecast_2h_gesamt') }} kWh

            Forecast 2h Flaeche 1: {{ states('sensor.sma_akku_pv_forecast_2h_flaeche_1') }} kWh

            Forecast 2h Flaeche 2: {{ states('sensor.sma_akku_pv_forecast_2h_flaeche_2') }} kWh

            Forecast 2h Flaeche 3: {{ states('sensor.sma_akku_pv_forecast_2h_flaeche_3') }} kWh

            Forecast PV-Leistung naechste 2h: {{ states('sensor.sma_akku_forecast_pv_leistung_naechste_2h') }} W

            PV Zeitslot Mittel 3d: {{ states('sensor.sma_akku_pv_zeitslot_mittel_3d') }} W

            Hausverbrauch aktuell: {{ states('sensor.sma_akku_hausverbrauch_aktuell') }} W

            Hausverbrauch Prognoseleistung: {{ states('sensor.sma_akku_hausverbrauch_prognoseleistung') }} W

            Hausverbrauch Zeitslot Mittel 3d: {{ states('sensor.sma_akku_hausverbrauch_zeitslot_mittel_3d') }} W

            Hausverbrauch Mittel 3h verwendet: {% set v = states('sensor.sma_akku_hausverbrauch_mittel_3h') %}{% if v | is_number %}{{ v }}{% else %}{{ states('sensor.sma_akku_hausverbrauch_mittel_3h_2') }}{% endif %} W

            Hausverbrauch Mittel 7d verwendet: {% set v = states('sensor.sma_akku_hausverbrauch_mittel_7d') %}{% if v | is_number %}{{ v }}{% else %}{{ states('sensor.sma_akku_hausverbrauch_mittel_7d_2') }}{% endif %} W

            Erwarteter Verbrauch bis PV-Ende: {{ states('sensor.sma_akku_erwarteter_verbrauch_bis_pv_ende') }} kWh

            Nutzbarer Forecast fuer Akku: {{ states('sensor.sma_akku_nutzbarer_forecast_fuer_akku') }} kWh

            Erwartete Ladeleistung naechste 2h: {{ states('sensor.sma_akku_erwartete_ladeleistung_naechste_2h') }} W

            Erwartete Ladeleistung Zeitslot 3d: {{ states('sensor.sma_akku_erwartete_ladeleistung_zeitslot_3d') }} W


            ## Nachtziel / Balancing

            Nachtziel aktiv: {{ states('input_boolean.sma_akku_nachtziel_aktiv') }}

            Nachtziel SOC: {{ states('sensor.sma_akku_nachtziel_soc') }} %

            Nacht-SOC-Verlust letzte Nacht: {{ states('input_number.sma_akku_nacht_soc_verlust_letzte') }} %

            Nacht-SOC-Verlust Prognose: {{ states('sensor.sma_akku_nacht_soc_verlust_prognose') }} %

            Nacht-SOC-Verlust Mittel 7d verwendet: {% set v = states('sensor.sma_akku_nacht_soc_verlust_mittel_7d') %}{% if v | is_number %}{{ v }}{% else %}{{ states('sensor.sma_akku_nacht_soc_verlust_mittel_7d_2') }}{% endif %} %

            Gewünschter Rest-SOC morgens: {{ states('input_number.sma_akku_rest_soc_pv_start') }} %

            Zusätzliche Nachtreserve: {{ states('input_number.sma_akku_nachtreserve_soc') }} %

            Balancing 100 aktiv: {{ states('input_boolean.sma_akku_balancing_100') }}

            Balancing wöchentlich aktiv: {{ states('input_boolean.sma_akku_balancing_woechentlich') }}

            Balancing Status: {{ states('sensor.sma_akku_balancing_status') }}

            Balancing Wochentag: {{ states('input_select.sma_akku_balancing_wochentag') }}

            Balancing Startzeit: {{ states('input_datetime.sma_akku_balancing_startzeit') }}

            Balancing Mindest-Restforecast: {{ states('input_number.sma_akku_balancing_min_restforecast_kwh') }} kWh


            ## EV-Verriegelung

            EV-Verriegelung aktiv: {{ states('input_boolean.smacc_ev_battery_lock_active') }}

            EV-Verriegelung soll aktiv sein: {{ states('binary_sensor.smacc_ev_battery_lock_should_be_active') }}

            EV-Modus: {{ states('sensor.smacc_ev_mode_text') }} / {{ states('sensor.smacc_ev_mode') }}

            EV-Ladeleistung: {{ states('sensor.smacc_ev_charge_power') }} W

            EV-Hausverbrauch ohne Auto: {{ states('sensor.smacc_ev_house_consumption_without_car') }} W

            EV-PV-Defizit Auto: {{ states('sensor.smacc_ev_pv_deficit') }} W

            EV-Akku-Entladeleistung Ziel: {{ states('sensor.smacc_ev_battery_discharge_target') }} W

  sma_akku_cmpbms_payload_schreiben:
    alias: SMA Akku CmpBMS Payload schreiben
    mode: queued
    max: 10
    fields:
      ladeleistung:
        description: Gewünschte Ladeleistung in Watt
      freigabe_code:
        description: CmpBMS Freigabe-/Sperrcode
      ladestatus:
        description: Optionaler Statustext für input_text.sma_akku_ladestatus
    sequence:
      - variables:
          ladeleistung_soll: "{{ ladeleistung | int(0) }}"
          entladeleistung_soll: "{{ states('sensor.smacc_ev_battery_discharge_target') | int(states('input_number.sma_akku_entladeleistung_max') | int(10600)) }}"
          freigabe_code_soll: "{{ freigabe_code | int(1438) }}"
          ladestatus_soll: "{{ ladestatus | default('', true) }}"
      - service: modbus.write_register
        data:
          hub: smacc_sma_modbus
          slave: 3
          address: 40793
          value:
            - 0
            - 0
      - delay:
          milliseconds: 300
      - service: modbus.write_register
        data:
          hub: smacc_sma_modbus
          slave: 3
          address: 40795
          value:
            - 0
            - "{{ ladeleistung_soll }}"
      - delay:
          milliseconds: 300
      - service: modbus.write_register
        data:
          hub: smacc_sma_modbus
          slave: 3
          address: 40797
          value:
            - 0
            - 0
      - delay:
          milliseconds: 300
      - service: modbus.write_register
        data:
          hub: smacc_sma_modbus
          slave: 3
          address: 40799
          value:
            - 0
            - "{{ entladeleistung_soll }}"
      - delay:
          milliseconds: 300
      - service: modbus.write_register
        data:
          hub: smacc_sma_modbus
          slave: 3
          address: 40801
          value:
            - 0
            - 0
      - delay:
          milliseconds: 300
      - service: modbus.write_register
        data:
          hub: smacc_sma_modbus
          slave: 3
          address: 40236
          value:
            - 0
            - "{{ freigabe_code_soll }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ ladestatus_soll | trim != '' }}"
            sequence:
              - service: input_text.set_value
                target:
                  entity_id: input_text.sma_akku_ladestatus
                data:
                  value: "{{ ladestatus_soll }}"
      - service: input_text.set_value
        target:
          entity_id: input_text.sma_akku_cmpbms_payload_letzte
        data:
          value: >
            40793:0|40795:{{ ladeleistung_soll }}|40797:0|40799:{{ entladeleistung_soll }}|40801:0|40236:{{ freigabe_code_soll }}

  sma_akku_cmpbms_laden_erlauben:
    alias: SMA Akku CmpBMS Laden erlauben
    mode: single
    sequence:
      - service: script.sma_akku_cmpbms_payload_schreiben
        data:
          ladeleistung: "{{ states('input_number.sma_akku_ladeleistung_max') | int(10600) }}"
          freigabe_code: 1438
          ladestatus: "Laden erlaubt"

  sma_akku_cmpbms_laden_sperren:
    alias: SMA Akku CmpBMS Laden sperren
    mode: single
    sequence:
      - service: script.sma_akku_cmpbms_payload_schreiben
        data:
          ladeleistung: 0
          freigabe_code: 2290
          ladestatus: "Laden gesperrt"


automation:
  - alias: SMA Akku Schonladen Spannungsbremse verwalten
    id: sma_akku_schonladen_spannungsbremse_verwalten
    mode: restart
    max_exceeded: silent
    trigger:
      - platform: homeassistant
        event: start
        id: start

      - platform: time_pattern
        minutes: "/1"
        id: minute

      - platform: state
        entity_id:
          - input_select.sma_akku_betriebsmodus
          - sensor.smacc_byd_max_cell_voltage_mv
          - input_number.sma_akku_schonladen_spannung_start_mv
          - input_number.sma_akku_schonladen_spannung_reset_mv
          - input_number.sma_akku_schonladen_ladeleistung_max
          - input_number.sma_akku_schonladen_c_obenrum
          - input_number.sma_akku_kapazitaet_kwh
          - input_number.sma_akku_ladeleistung_max
        id: state

    action:
      - variables:
          modus: "{{ states('input_select.sma_akku_betriebsmodus') }}"
          vmax: "{{ states('sensor.smacc_byd_max_cell_voltage_mv') | float(0) }}"
          start_mv: "{{ states('input_number.sma_akku_schonladen_spannung_start_mv') | float(3430) }}"
          reset_mv: "{{ states('input_number.sma_akku_schonladen_spannung_reset_mv') | float(3370) }}"
          max_helper: "{{ states('input_number.sma_akku_schonladen_ladeleistung_max') | float(0) }}"
          max_ladung: >
            {% set m = states('input_number.sma_akku_schonladen_ladeleistung_max') | float(0) %}
            {{ (m if m > 0 else states('input_number.sma_akku_ladeleistung_max') | float(10600)) | round(0) }}
          min_limit: "{{ states('sensor.sma_akku_schonladen_ladeleistung_obenrum') | float(0) | round(0) }}"
          gespeichert_raw: "{{ states('input_number.sma_akku_schonladen_ladegrenze_aktuell') | float(0) }}"
          gespeichert: >
            {% set raw = states('input_number.sma_akku_schonladen_ladegrenze_aktuell') | float(0) %}
            {% set max_cfg = (states('input_number.sma_akku_schonladen_ladeleistung_max') | float(0)) %}
            {% set max_eff = max_cfg if max_cfg > 0 else states('input_number.sma_akku_ladeleistung_max') | float(10600) %}
            {{ (raw if raw > 0 else max_eff) | round(0) }}
          ladeleistung_aktuell: "{{ states('sensor.smacc_battery_charge_power') | float(0) }}"
          ziel: "{{ states('sensor.sma_akku_aktuelles_ladeziel_soc') | float(100) }}"
          soc: "{{ states('sensor.smacc_battery_soc') | float(0) }}"
          kandidat: >
            {% set aktuell = states('sensor.smacc_battery_charge_power') | float(0) %}
            {% set min_cfg = states('sensor.sma_akku_schonladen_ladeleistung_obenrum') | float(0) %}
            {% set step = (((aktuell * 2 / 3) // 100) * 100) | float(0) %}
            {{ [step, min_cfg] | max | round(0) }}

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ modus != 'Schonladen' and (gespeichert | float(0)) != (max_ladung | float(0)) }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.sma_akku_schonladen_ladegrenze_aktuell
                data:
                  value: "{{ max_ladung | float(0) }}"

          - conditions:
              - condition: template
                value_template: "{{ modus == 'Schonladen' and vmax <= reset_mv and (gespeichert | float(0)) != (max_ladung | float(0)) }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.sma_akku_schonladen_ladegrenze_aktuell
                data:
                  value: "{{ max_ladung | float(0) }}"

          - conditions:
              - condition: template
                value_template: >
                  {{
                    modus == 'Schonladen'
                    and vmax >= start_mv
                    and ladeleistung_aktuell > 100
                    and soc < ziel
                    and gespeichert >= (max_ladung - 50)
                    and kandidat < max_ladung
                  }}
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.sma_akku_schonladen_ladegrenze_aktuell
                data:
                  value: "{{ [[kandidat | float(0), min_limit | float(0)] | max, max_ladung | float(0)] | min }}"

          - conditions:
              - condition: template
                value_template: >
                  {{
                    modus == 'Schonladen'
                    and vmax >= start_mv
                    and ladeleistung_aktuell > 100
                    and soc < ziel
                    and gespeichert < (max_ladung - 50)
                    and ladeleistung_aktuell >= (gespeichert * 0.9)
                    and gespeichert > (min_limit + 50)
                    and kandidat < (gespeichert - 50)
                  }}
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.sma_akku_schonladen_ladegrenze_aktuell
                data:
                  value: "{{ [[kandidat | float(0), min_limit | float(0)] | max, max_ladung | float(0)] | min }}"

  - alias: SMA Akku CmpBMS Ladesteuerung dynamisch
    id: sma_akku_cmpbms_ladesteuerung_dynamisch
    mode: queued
    max: 10
    max_exceeded: silent
    trigger:
      - platform: homeassistant
        event: start
        id: start

      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.sma_akku_modbus_refresh
        id: timer

      - platform: numeric_state
        entity_id: sensor.smacc_battery_charge_power
        above: 100
        for:
          seconds: 20
        id: ladestart

      # Sofort nur bei stabilen Steuergrößen.
      # Wichtig: kein Trigger auf Entscheidungstext, Ladestatus, Forecast-/Leistungswerte.
      - platform: state
        entity_id:
          - binary_sensor.sma_akku_laden_soll_erlaubt_sein
          - binary_sensor.sma_akku_pv_standby_aktiv
          - binary_sensor.smacc_ev_battery_lock_should_be_active
          - sensor.smacc_battery_soc
          - sensor.sma_akku_aktuelles_ladeziel_soc
          - sensor.sma_akku_dynamisches_ziel_soc
          - sensor.smacc_ev_battery_discharge_target
        id: state

      - platform: state
        entity_id: sensor.sma_akku_akku_laedt_trotz_sperre
        to: "True"
        id: trotz_sperre

      - platform: state
        entity_id:
          - input_select.sma_akku_betriebsmodus
          - input_boolean.sma_akku_ladesteuerung_aktiv
          - input_boolean.sma_akku_ladephase_bis_ziel_aktiv
          - input_boolean.sma_akku_jetzt_laden_aktiv
          - input_boolean.sma_akku_zielzeit_dynamisch_aktiv
          - input_boolean.sma_akku_nachtziel_aktiv
          - input_boolean.sma_akku_morgen_forecast_aktiv
          - input_boolean.sma_akku_balancing_100
          - input_boolean.sma_akku_balancing_woechentlich
          - input_select.sma_akku_balancing_wochentag
          - input_datetime.sma_akku_balancing_startzeit
          - input_number.sma_akku_balancing_min_restforecast_kwh
          - input_number.sma_akku_ziel_mittag
          - input_number.sma_akku_ziel_tagesende
          - input_number.sma_akku_ladephase_ziel_soc
          - input_number.sma_akku_jetzt_laden_ziel_soc
          - input_number.sma_akku_schonladen_ziel_soc
          - input_number.sma_akku_schonladen_ladeleistung_max
          - input_number.sma_akku_schonladen_spannung_start_mv
          - input_number.sma_akku_schonladen_spannung_reset_mv
          - input_number.sma_akku_schonladen_ladegrenze_aktuell
          - input_number.sma_akku_schonladen_c_obenrum
          - input_number.sma_akku_ziel_hysterese
          - input_number.sma_akku_ladeleistung_max
          - input_number.sma_akku_entladeleistung_max
          - input_number.sma_akku_ladezeit_reserve_stunden
          - input_number.sma_akku_ladewirkungsgrad
          - input_number.sma_akku_kapazitaet_kwh
          - input_number.sma_akku_hausverbrauch_faktor
          - input_datetime.sma_akku_ladephase_fruehestens_zeit
          - input_datetime.sma_akku_ladephase_spaetestens_zeit
          - input_datetime.sma_akku_ziel_erreicht_zeit
          - input_number.sma_akku_zielzeit_sicherheitsreserve_minuten
          - input_number.sma_akku_zielzeit_puffer_vor_pv_ende_minuten
          - input_number.sma_akku_morgen_forecast_schwelle_mittel
          - input_number.sma_akku_morgen_forecast_schwelle_schlecht
          - input_number.sma_akku_ziel_morgen_mittel
          - input_number.sma_akku_ziel_morgen_schlecht
          - input_number.sma_akku_rest_soc_pv_start
          - input_number.sma_akku_nachtreserve_soc
          - input_number.sma_akku_nachtziel_min_soc
          - input_number.sma_akku_nachtziel_max_soc
          - input_number.sma_akku_nacht_soc_verlust_fallback
        id: helper

    condition:
      - condition: state
        entity_id: input_boolean.sma_akku_ladesteuerung_aktiv
        state: "on"

    action:
      - variables:
          trigger_art: "{{ trigger.id | default('unknown') }}"
          modus: "{{ states('input_select.sma_akku_betriebsmodus') }}"
          standby_aktiv: "{{ is_state('binary_sensor.sma_akku_pv_standby_aktiv', 'on') }}"
          laden_erlauben: "{{ is_state('binary_sensor.sma_akku_laden_soll_erlaubt_sein', 'on') }}"
          soc: "{{ states('sensor.smacc_battery_soc') | float(0) }}"
          ziel: "{{ states('sensor.sma_akku_aktuelles_ladeziel_soc') | float(40) }}"
          entscheidung: "{{ states('sensor.sma_akku_entscheidung_text') }}"
          letzter_status: "{{ states('input_text.sma_akku_ladestatus') }}"
          letztes_payload: "{{ states('input_text.sma_akku_cmpbms_payload_letzte') }}"
          ladeleistung_ist: "{{ states('sensor.smacc_battery_charge_power') | float(0) }}"
          ladephase_ziel_gespeichert: "{{ states('input_number.sma_akku_ladephase_ziel_soc') | float(0) }}"
          balancing_tag_ohne_eingriff: >
            {% set tage = {
              'Montag': 0,
              'Dienstag': 1,
              'Mittwoch': 2,
              'Donnerstag': 3,
              'Freitag': 4,
              'Samstag': 5,
              'Sonntag': 6
            } %}
            {{
              is_state('input_boolean.sma_akku_balancing_100', 'on')
              and now().weekday() == tage.get(states('input_select.sma_akku_balancing_wochentag'), 6)
            }}
          ziel_100_ohne_sperre: "{{ ziel >= 100 }}"
          ladephase_eingerastet: >
            {{
              modus == 'Dynamik'
              and
              is_state('input_boolean.sma_akku_ladephase_bis_ziel_aktiv', 'on')
              and ladephase_ziel_gespeichert > 0
              and soc < ladephase_ziel_gespeichert
            }}
          cmpbms_ladeleistung: >
            {% if standby_aktiv or ((soc >= ziel) and not ziel_100_ohne_sperre) or not laden_erlauben %}
              0
            {% else %}
              {{ states('sensor.sma_akku_wirksame_ladeleistung_max') | int(states('input_number.sma_akku_ladeleistung_max') | int(10600)) }}
            {% endif %}
          cmpbms_entladeleistung: "{{ states('sensor.smacc_ev_battery_discharge_target') | int(states('input_number.sma_akku_entladeleistung_max') | int(10600)) }}"
          cmpbms_freigabe_code: >
            {% if standby_aktiv or ((soc >= ziel) and not ziel_100_ohne_sperre) or not laden_erlauben %}
              2290
            {% else %}
              1438
            {% endif %}
          sollstatus: >
            {% if standby_aktiv %}
              Standby
            {% elif balancing_tag_ohne_eingriff %}
              Balancing-Tag - kein Eingriff
            {% elif ladephase_eingerastet %}
              Ladephase aktiv - Laden bis Ziel
            {% elif ziel_100_ohne_sperre and soc >= ziel %}
              Ziel 100 % - kein Eingriff
            {% elif modus == 'Schonladen' and laden_erlauben %}
              Schonladen - Laden bis Ziel
            {% elif soc >= ziel %}
              Laden gesperrt
            {% elif laden_erlauben %}
              Laden erlaubt
            {% else %}
              Laden gesperrt
            {% endif %}
          payload_soll: >
            40793:0|40795:{{ cmpbms_ladeleistung | trim }}|40797:0|40799:{{ cmpbms_entladeleistung }}|40801:0|40236:{{ cmpbms_freigabe_code | trim }}
          schreiben_erforderlich: >
            {{
              trigger_art in ['start', 'timer', 'trotz_sperre']
              or sollstatus != letzter_status
              or payload_soll | trim != letztes_payload | trim
            }}

      - choose:
          # Standby: ausdrücklich kein Modbus schreiben, Timer stoppen.
          - conditions:
              - condition: template
                value_template: "{{ standby_aktiv }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.sma_akku_ladephase_bis_ziel_aktiv
              - service: input_number.set_value
                target:
                  entity_id: input_number.sma_akku_ladephase_ziel_soc
                data:
                  value: 0
              - service: timer.cancel
                target:
                  entity_id: timer.sma_akku_modbus_refresh
              - service: input_text.set_value
                target:
                  entity_id: input_text.sma_akku_ladestatus
                data:
                  value: "Standby - kein Modbus"

          # Am eingestellten Balancing-Tag nicht eingreifen; System nur einmal auf Automatik lassen.
          - conditions:
              - condition: template
                value_template: "{{ balancing_tag_ohne_eingriff }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ letzter_status != 'Balancing-Tag - kein Eingriff' }}"
                    sequence:
                      - service: script.sma_akku_cmpbms_payload_schreiben
                        data:
                          ladeleistung: "{{ states('input_number.sma_akku_ladeleistung_max') | int(10600) }}"
                          freigabe_code: 1438
                          ladestatus: "Laden erlaubt"
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.sma_akku_ladephase_bis_ziel_aktiv
              - service: input_number.set_value
                target:
                  entity_id: input_number.sma_akku_ladephase_ziel_soc
                data:
                  value: 0
              - service: timer.cancel
                target:
                  entity_id: timer.sma_akku_modbus_refresh
              - service: input_text.set_value
                target:
                  entity_id: input_text.sma_akku_ladestatus
                data:
                  value: "Balancing-Tag - kein Eingriff"

          # Bei echtem 100-%-Ziel nicht sperren, sondern auf Automatik/Freigabe bleiben.
          - conditions:
              - condition: template
                value_template: "{{ ziel_100_ohne_sperre and soc >= ziel and not balancing_tag_ohne_eingriff and not ladephase_eingerastet }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ letzter_status != 'Ziel 100 % - kein Eingriff' }}"
                    sequence:
                      - service: script.sma_akku_cmpbms_payload_schreiben
                        data:
                          ladeleistung: "{{ states('input_number.sma_akku_ladeleistung_max') | int(10600) }}"
                          freigabe_code: 1438
                          ladestatus: "Laden erlaubt"
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.sma_akku_jetzt_laden_aktiv
              - service: input_number.set_value
                target:
                  entity_id: input_number.sma_akku_jetzt_laden_ziel_soc
                data:
                  value: 0
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.sma_akku_ladephase_bis_ziel_aktiv
              - service: input_number.set_value
                target:
                  entity_id: input_number.sma_akku_ladephase_ziel_soc
                data:
                  value: 0
              - service: timer.cancel
                target:
                  entity_id: timer.sma_akku_modbus_refresh
              - service: input_text.set_value
                target:
                  entity_id: input_text.sma_akku_ladestatus
                data:
                  value: "Ziel 100 % - kein Eingriff"

          # Nur bei Start/Timer oder tatsächlichem Statuswechsel schreiben.
          - conditions:
              - condition: template
                value_template: "{{ schreiben_erforderlich }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ sollstatus in ['Laden erlaubt', 'Ladephase aktiv - Laden bis Ziel', 'Schonladen - Laden bis Ziel'] }}"
                    sequence:
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: "{{ modus == 'Dynamik' and soc < ziel and not standby_aktiv and not balancing_tag_ohne_eingriff }}"
                            sequence:
                              - service: input_number.set_value
                                target:
                                  entity_id: input_number.sma_akku_ladephase_ziel_soc
                                data:
                                  value: "{{ ziel | round(0) }}"
                              - service: input_boolean.turn_on
                                target:
                                  entity_id: input_boolean.sma_akku_ladephase_bis_ziel_aktiv
                      - service: script.sma_akku_cmpbms_payload_schreiben
                        data:
                          ladeleistung: "{{ cmpbms_ladeleistung | int(0) }}"
                          freigabe_code: 1438
                          ladestatus: "{{ sollstatus }}"
                      - service: timer.start
                        target:
                          entity_id: timer.sma_akku_modbus_refresh
                        data:
                          duration: "00:04:00"

                  - conditions:
                      - condition: template
                        value_template: "{{ sollstatus == 'Laden gesperrt' }}"
                    sequence:
                      - service: input_boolean.turn_off
                        target:
                          entity_id: input_boolean.sma_akku_ladephase_bis_ziel_aktiv
                      - service: input_number.set_value
                        target:
                          entity_id: input_number.sma_akku_ladephase_ziel_soc
                        data:
                          value: 0
                      - service: script.sma_akku_cmpbms_payload_schreiben
                        data:
                          ladeleistung: 0
                          freigabe_code: 2290
                          ladestatus: "Laden gesperrt"
                      - service: timer.start
                        target:
                          entity_id: timer.sma_akku_modbus_refresh
                        data:
                          duration: "00:04:00"

        default: []


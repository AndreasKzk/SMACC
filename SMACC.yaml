    name: SMA Akku Hausverbrauch Mittel 3h
    entity_id: sensor.sma_akku_hausverbrauch_aktuell
    state_characteristic: mean
    max_age:
      hours: 3
    sampling_size: 1000

  - platform: statistics
    name: SMA Akku Hausverbrauch Mittel 7d
    entity_id: sensor.sma_akku_hausverbrauch_aktuell
    state_characteristic: mean
    max_age:
      days: 7
    sampling_size: 10000

  - platform: statistics
    name: SMA Akku Nacht SOC Verlust Mittel 7d
    entity_id: input_number.sma_akku_nacht_soc_verlust_letzte
    state_characteristic: mean
    max_age:
      days: 7
    sampling_size: 20


sql:
  - name: SMA Akku PV Zeitslot Mittel 3d
    unique_id: sma_akku_pv_zeitslot_mittel_3d
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    icon: mdi:solar-power
    query: >
      {% set slot_minute = 30 if now().minute >= 30 else 0 %}
      {% set slot_now = now().replace(minute=slot_minute, second=0, microsecond=0) %}
      SELECT ROUND(AVG(day_mean), 0) AS value
      FROM (
        SELECT AVG(s.mean) AS day_mean
        FROM statistics_short_term s
        JOIN statistics_meta m ON s.metadata_id = m.id
        WHERE m.statistic_id = 'sensor.smacc_pv_power_total'
          AND s.start_ts >= {{ as_timestamp(slot_now - timedelta(days=1)) }}
          AND s.start_ts < {{ as_timestamp(slot_now - timedelta(days=1) + timedelta(minutes=30)) }}
        UNION ALL
        SELECT AVG(s.mean) AS day_mean
        FROM statistics_short_term s
        JOIN statistics_meta m ON s.metadata_id = m.id
        WHERE m.statistic_id = 'sensor.smacc_pv_power_total'
          AND s.start_ts >= {{ as_timestamp(slot_now - timedelta(days=2)) }}
          AND s.start_ts < {{ as_timestamp(slot_now - timedelta(days=2) + timedelta(minutes=30)) }}
        UNION ALL
        SELECT AVG(s.mean) AS day_mean
        FROM statistics_short_term s
        JOIN statistics_meta m ON s.metadata_id = m.id
        WHERE m.statistic_id = 'sensor.smacc_pv_power_total'
          AND s.start_ts >= {{ as_timestamp(slot_now - timedelta(days=3)) }}
          AND s.start_ts < {{ as_timestamp(slot_now - timedelta(days=3) + timedelta(minutes=30)) }}
      ) t
      WHERE day_mean IS NOT NULL;
    column: "value"

  - name: SMA Akku Hausverbrauch Zeitslot Mittel 3d
    unique_id: sma_akku_hausverbrauch_zeitslot_mittel_3d
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    icon: mdi:home-clock
    query: >
      {% set slot_minute = 30 if now().minute >= 30 else 0 %}
      {% set slot_now = now().replace(minute=slot_minute, second=0, microsecond=0) %}
      SELECT ROUND(AVG(day_mean), 0) AS value
      FROM (
        SELECT AVG(s.mean) AS day_mean
        FROM statistics_short_term s
        JOIN statistics_meta m ON s.metadata_id = m.id
        WHERE m.statistic_id = 'sensor.sma_akku_hausverbrauch_aktuell'
          AND s.start_ts >= {{ as_timestamp(slot_now - timedelta(days=1)) }}
          AND s.start_ts < {{ as_timestamp(slot_now - timedelta(days=1) + timedelta(minutes=30)) }}
        UNION ALL
        SELECT AVG(s.mean) AS day_mean
        FROM statistics_short_term s
        JOIN statistics_meta m ON s.metadata_id = m.id
        WHERE m.statistic_id = 'sensor.sma_akku_hausverbrauch_aktuell'
          AND s.start_ts >= {{ as_timestamp(slot_now - timedelta(days=2)) }}
          AND s.start_ts < {{ as_timestamp(slot_now - timedelta(days=2) + timedelta(minutes=30)) }}
        UNION ALL
        SELECT AVG(s.mean) AS day_mean
        FROM statistics_short_term s
        JOIN statistics_meta m ON s.metadata_id = m.id
        WHERE m.statistic_id = 'sensor.sma_akku_hausverbrauch_aktuell'
          AND s.start_ts >= {{ as_timestamp(slot_now - timedelta(days=3)) }}
          AND s.start_ts < {{ as_timestamp(slot_now - timedelta(days=3) + timedelta(minutes=30)) }}
      ) t
      WHERE day_mean IS NOT NULL;
    column: "value"


template:
  - sensor:
      - name: SMA Akku Hausverbrauch aktuell
        unique_id: sma_akku_hausverbrauch_aktuell
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:home-lightning-bolt
        availability: >
          {{
            states('sensor.smacc_pv_power_total') | is_number and
            states('sensor.smacc_grid_import_power') | is_number and
            states('sensor.smacc_grid_export_power') | is_number and
            states('sensor.smacc_battery_discharge_power') | is_number and
            states('sensor.smacc_battery_charge_power') | is_number
          }}
        state: >
          {% set pv = states('sensor.smacc_pv_power_total') | float(0) %}
          {% set netzbezug = states('sensor.smacc_grid_import_power') | float(0) %}
          {% set einspeisung = states('sensor.smacc_grid_export_power') | float(0) %}
          {% set batterie_entladung = states('sensor.smacc_battery_discharge_power') | float(0) %}
          {% set batterie_ladung = states('sensor.smacc_battery_charge_power') | float(0) %}
          {% set hausverbrauch = pv + netzbezug + batterie_entladung - einspeisung - batterie_ladung %}
          {{ [hausverbrauch, 0] | max | round(0) }}

      - name: SMA Akku Hausverbrauch Prognoseleistung
        unique_id: sma_akku_hausverbrauch_prognoseleistung
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:home-clock
        state: >
          {% set aktuell = states('sensor.sma_akku_hausverbrauch_aktuell') | float(0) %}

          {% set m3_alt = states('sensor.sma_akku_hausverbrauch_mittel_3h') %}
          {% set m3_neu = states('sensor.sma_akku_hausverbrauch_mittel_3h_2') %}
          {% set m3 = (m3_alt if m3_alt | is_number else m3_neu) | float(0) %}

          {% set m7_alt = states('sensor.sma_akku_hausverbrauch_mittel_7d') %}
          {% set m7_neu = states('sensor.sma_akku_hausverbrauch_mittel_7d_2') %}
          {% set m7 = (m7_alt if m7_alt | is_number else m7_neu) | float(0) %}

          {% set faktor = states('input_number.sma_akku_hausverbrauch_faktor') | float(1.0) %}
          {% set basis = [aktuell, m3, m7] | max %}
          {{ (basis * faktor) | round(0) }}

      - name: SMA Akku PV Forecast Resttag Gesamt
        unique_id: sma_akku_pv_forecast_resttag_gesamt
        unit_of_measurement: "kWh"
        icon: mdi:solar-power
        state: >
          {{
            (
              states('sensor.smacc_pv1_forecast_today_remaining') | float(0)
              + states('sensor.smacc_pv2_forecast_today_remaining') | float(0)
              + states('sensor.smacc_pv3_forecast_today_remaining') | float(0)
            ) | round(2)
          }}

      - name: SMA Akku PV Forecast Heute Gesamt
        unique_id: sma_akku_pv_forecast_heute_gesamt
        unit_of_measurement: "kWh"
        icon: mdi:solar-power
        state: >
          {{
            (
              states('sensor.smacc_pv1_forecast_today_total') | float(0)
              + states('sensor.smacc_pv2_forecast_today_total') | float(0)
              + states('sensor.smacc_pv3_forecast_today_total') | float(0)
            ) | round(2)
          }}

      - name: SMA Akku PV Forecast Morgen Gesamt
        unique_id: sma_akku_pv_forecast_morgen_gesamt
        unit_of_measurement: "kWh"
        icon: mdi:solar-power
        state: >
          {{
            (
              states('sensor.smacc_pv1_forecast_tomorrow_total') | float(0)
              + states('sensor.smacc_pv2_forecast_tomorrow_total') | float(0)
              + states('sensor.smacc_pv3_forecast_tomorrow_total') | float(0)
            ) | round(2)
          }}

      - name: SMA Akku PV Forecast Diese Stunde Gesamt
        unique_id: sma_akku_pv_forecast_diese_stunde_gesamt
        unit_of_measurement: "kWh"
        icon: mdi:solar-power
        state: >
          {{
            (
              states('sensor.smacc_pv1_forecast_current_hour') | float(0)
              + states('sensor.smacc_pv2_forecast_current_hour') | float(0)
              + states('sensor.smacc_pv3_forecast_current_hour') | float(0)
            ) | round(2)
          }}

      - name: SMA Akku PV Forecast Naechste Stunde Gesamt
        unique_id: sma_akku_pv_forecast_naechste_stunde_gesamt
        unit_of_measurement: "kWh"
        icon: mdi:solar-power
        state: >
          {{
            (
              states('sensor.smacc_pv1_forecast_next_hour') | float(0)
              + states('sensor.smacc_pv2_forecast_next_hour') | float(0)
              + states('sensor.smacc_pv3_forecast_next_hour') | float(0)
            ) | round(2)
          }}

      - name: SMA Akku PV Forecast 2h Gesamt
        unique_id: sma_akku_pv_forecast_2h_gesamt
        unit_of_measurement: "kWh"
        icon: mdi:solar-power
        state: >
          {% set anteil = (60 - now().minute) / 60 %}
          {% set f1 = (states('sensor.smacc_pv1_forecast_current_hour') | float(0) * anteil) + states('sensor.smacc_pv1_forecast_next_hour') | float(0) %}
          {% set f2 = (states('sensor.smacc_pv2_forecast_current_hour') | float(0) * anteil) + states('sensor.smacc_pv2_forecast_next_hour') | float(0) %}
          {% set f3 = (states('sensor.smacc_pv3_forecast_current_hour') | float(0) * anteil) + states('sensor.smacc_pv3_forecast_next_hour') | float(0) %}
          {% set summe = f1 + f2 + f3 %}
          {% set resttag = states('sensor.sma_akku_pv_forecast_resttag_gesamt') | float(0) %}
          {{ [summe, resttag] | min | round(2) }}

      - name: SMA Akku PV Forecast 2h Flaeche 1
        unique_id: sma_akku_pv_forecast_2h_flaeche_1
        unit_of_measurement: "kWh"
        icon: mdi:solar-panel
        state: >
          {% set anteil = (60 - now().minute) / 60 %}
          {{ ((states('sensor.smacc_pv1_forecast_current_hour') | float(0) * anteil) + states('sensor.smacc_pv1_forecast_next_hour') | float(0)) | round(2) }}

      - name: SMA Akku PV Forecast 2h Flaeche 2
        unique_id: sma_akku_pv_forecast_2h_flaeche_2
        unit_of_measurement: "kWh"
        icon: mdi:solar-panel
        state: >
          {% set anteil = (60 - now().minute) / 60 %}
          {{ ((states('sensor.smacc_pv2_forecast_current_hour') | float(0) * anteil) + states('sensor.smacc_pv2_forecast_next_hour') | float(0)) | round(2) }}

      - name: SMA Akku PV Forecast 2h Flaeche 3
        unique_id: sma_akku_pv_forecast_2h_flaeche_3
        unit_of_measurement: "kWh"
        icon: mdi:solar-panel
        state: >
          {% set anteil = (60 - now().minute) / 60 %}
          {{ ((states('sensor.smacc_pv3_forecast_current_hour') | float(0) * anteil) + states('sensor.smacc_pv3_forecast_next_hour') | float(0)) | round(2) }}

      - name: SMA Akku Forecast PV Leistung naechste 2h
        unique_id: sma_akku_forecast_pv_leistung_naechste_2h
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:solar-power
        state: >
          {% set kwh = states('sensor.sma_akku_pv_forecast_2h_gesamt') | float(0) %}
          {{ ((kwh / 2) * 1000) | round(0) }}

      - name: SMA Akku PV Reststunden geschaetzt
        unique_id: sma_akku_pv_reststunden_geschaetzt
        unit_of_measurement: "h"
        icon: mdi:clock-end
        state: >
          {% set rest = states('sensor.sma_akku_pv_forecast_resttag_gesamt') | float(0) %}
          {% set leistung = states('sensor.sma_akku_forecast_pv_leistung_naechste_2h') | float(0) %}
          {% set max_h = states('input_number.sma_akku_pv_reststunden_max') | float(12) %}
          {% if leistung <= 0 %}
            0
          {% else %}
            {{ [rest / (leistung / 1000), max_h] | min | round(1) }}
          {% endif %}

      - name: SMA Akku Erwarteter Verbrauch bis PV Ende
        unique_id: sma_akku_erwarteter_verbrauch_bis_pv_ende
        unit_of_measurement: "kWh"
        icon: mdi:home-lightning-bolt
        state: >
          {% set verbrauch_w = states('sensor.sma_akku_hausverbrauch_prognoseleistung') | float(0) %}
          {% set h = states('sensor.sma_akku_pv_reststunden_geschaetzt') | float(0) %}
          {{ ((verbrauch_w * h) / 1000) | round(2) }}

      - name: SMA Akku Nutzbarer Forecast fuer Akku
        unique_id: sma_akku_nutzbarer_forecast_fuer_akku
        unit_of_measurement: "kWh"
        icon: mdi:battery-clock
        state: >
          {% set rest = states('sensor.sma_akku_pv_forecast_resttag_gesamt') | float(0) %}
          {% set verbrauch = states('sensor.sma_akku_erwarteter_verbrauch_bis_pv_ende') | float(0) %}
          {{ [rest - verbrauch, 0] | max | round(2) }}

      - name: SMA Akku Erwartete Ladeleistung naechste 2h
        unique_id: sma_akku_erwartete_ladeleistung_naechste_2h
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:battery-charging-medium
        state: >
          {% set pv = states('sensor.sma_akku_forecast_pv_leistung_naechste_2h') | float(0) %}
          {% set haus = states('sensor.sma_akku_hausverbrauch_prognoseleistung') | float(0) %}
          {{ [pv - haus, 0] | max | round(0) }}

      - name: SMA Akku Erwartete Ladeleistung Zeitslot 3d
        unique_id: sma_akku_erwartete_ladeleistung_zeitslot_3d
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:battery-charging-medium
        state: >
          {% set pv_hist = states('sensor.sma_akku_pv_zeitslot_mittel_3d') %}
          {% set haus_hist = states('sensor.sma_akku_hausverbrauch_zeitslot_mittel_3d') %}
          {% set pv = (pv_hist if pv_hist | is_number else states('sensor.smacc_pv_power_total')) | float(0) %}
          {% set haus = (haus_hist if haus_hist | is_number else states('sensor.sma_akku_hausverbrauch_aktuell')) | float(0) %}
          {{ [pv - haus, 0] | max | round(0) }}

      - name: SMA Akku Nacht SOC Verlust Prognose
        unique_id: sma_akku_nacht_soc_verlust_prognose
        unit_of_measurement: "%"
        icon: mdi:weather-night
        state: >
          {% set mittel_alt = states('sensor.sma_akku_nacht_soc_verlust_mittel_7d') %}
          {% set mittel_neu = states('sensor.sma_akku_nacht_soc_verlust_mittel_7d_2') %}
          {% set mittel = (mittel_alt if mittel_alt | is_number else mittel_neu) | float(0) %}
          {% set letzte = states('input_number.sma_akku_nacht_soc_verlust_letzte') | float(0) %}
          {% set fallback = states('input_number.sma_akku_nacht_soc_verlust_fallback') | float(35) %}
          {{ [mittel, letzte, fallback] | max | round(1) }}

      - name: SMA Akku Nachtziel SOC
        unique_id: sma_akku_nachtziel_soc
        unit_of_measurement: "%"
        icon: mdi:weather-night
        state: >
          {% set verlust = states('sensor.sma_akku_nacht_soc_verlust_prognose') | float(0) %}
          {% set rest = states('input_number.sma_akku_rest_soc_pv_start') | float(20) %}
          {% set reserve = states('input_number.sma_akku_nachtreserve_soc') | float(0) %}
          {% set minimum = states('input_number.sma_akku_nachtziel_min_soc') | float(0) %}
          {% set maximum = states('input_number.sma_akku_nachtziel_max_soc') | float(100) %}
          {% set ziel = verlust + rest + reserve %}
          {{ [[ziel, minimum] | max, maximum] | min | round(0) }}

      - name: SMA Akku Dynamisches Ziel SOC
        unique_id: sma_akku_dynamisches_ziel_soc
        unit_of_measurement: "%"
        icon: mdi:battery-target
        state: >
          {% set standard = states('input_number.sma_akku_ziel_tagesende') | float(80) %}
          {% set nacht = states('sensor.sma_akku_nachtziel_soc') | float(0) %}
          {% set morgen = states('sensor.sma_akku_pv_forecast_morgen_gesamt') | float(0) %}
          {% set schw_mittel = states('input_number.sma_akku_morgen_forecast_schwelle_mittel') | float(25) %}
          {% set schw_schlecht = states('input_number.sma_akku_morgen_forecast_schwelle_schlecht') | float(15) %}
          {% set ziel_mittel = states('input_number.sma_akku_ziel_morgen_mittel') | float(90) %}
          {% set ziel_schlecht = states('input_number.sma_akku_ziel_morgen_schlecht') | float(95) %}
          {% if is_state('input_boolean.sma_akku_balancing_100', 'on') %}
            100
          {% else %}
            {% if is_state('input_boolean.sma_akku_nachtziel_aktiv', 'on') and nacht > 0 %}
              {% set basis = nacht %}
            {% else %}
              {% set basis = standard %}
            {% endif %}
            {% set morgen_ziel = 0 %}
            {% if is_state('input_boolean.sma_akku_morgen_forecast_aktiv', 'on') and morgen > 0 and morgen < schw_schlecht %}
              {% set morgen_ziel = ziel_schlecht %}
            {% elif is_state('input_boolean.sma_akku_morgen_forecast_aktiv', 'on') and morgen > 0 and morgen < schw_mittel %}
              {% set morgen_ziel = ziel_mittel %}
            {% endif %}
            {{ [basis, morgen_ziel] | max | round(0) }}
          {% endif %}

      - name: SMA Akku Fehlende Energie bis Ziel
        unique_id: sma_akku_fehlende_energie_bis_ziel
        unit_of_measurement: "kWh"
        icon: mdi:battery-plus
        state: >
          {% set soc = states('sensor.smacc_battery_soc') | float(0) %}
          {% set ziel = states('sensor.sma_akku_dynamisches_ziel_soc') | float(80) %}
          {% set kap = states('input_number.sma_akku_kapazitaet_kwh') | float(12.8) %}
          {{ ([ziel - soc, 0] | max / 100 * kap) | round(2) }}

      - name: SMA Akku Benötigte Ladezeit bis Ziel
        unique_id: sma_akku_benoetigte_ladezeit_bis_ziel
        unit_of_measurement: "h"
        icon: mdi:timer-sand
        state: >
          {% set fehl = states('sensor.sma_akku_fehlende_energie_bis_ziel') | float(0) %}
          {% set leistung = states('sensor.sma_akku_erwartete_ladeleistung_zeitslot_3d') | float(0) %}
          {% set wirk = states('input_number.sma_akku_ladewirkungsgrad') | float(0.9) %}
          {% if fehl <= 0 %}
            0
          {% elif leistung <= 0 %}
            99
          {% else %}
            {{ (fehl / ((leistung / 1000) * wirk)) | round(2) }}
          {% endif %}

      - name: SMA Akku Zielzeit effektiv
        unique_id: sma_akku_zielzeit_effektiv
        device_class: timestamp
        icon: mdi:clock-end
        state: >
          {% set manuell_str = states('input_datetime.sma_akku_ziel_erreicht_zeit') %}
          {% set manuell = today_at(manuell_str if manuell_str not in ['unknown', 'unavailable', 'none', ''] else '18:00:00') %}
          {% if not is_state('input_boolean.sma_akku_zielzeit_dynamisch_aktiv', 'on') %}
            {{ manuell.isoformat() }}
          {% else %}
            {% set pv_ende = states('input_datetime.sma_akku_pv_ende_letzte') %}
            {% set puffer = states('input_number.sma_akku_zielzeit_puffer_vor_pv_ende_minuten') | int(30) %}
            {% set reserve = states('input_number.sma_akku_zielzeit_sicherheitsreserve_minuten') | int(60) %}
            {% if pv_ende in ['unknown', 'unavailable', 'none', ''] %}
              {{ manuell.isoformat() }}
            {% else %}
              {% set dt = as_datetime(pv_ende) %}
              {% set ziel = today_at(dt.strftime('%H:%M:%S')) - timedelta(minutes=(puffer + reserve)) %}
              {{ ziel.isoformat() }}
            {% endif %}
          {% endif %}

      - name: SMA Akku Zielzeit effektiv Text
        unique_id: sma_akku_zielzeit_effektiv_text
        icon: mdi:clock-end
        state: >
          {% set ts = states('sensor.sma_akku_zielzeit_effektiv') %}
          {% if ts in ['unknown', 'unavailable', 'none', ''] %}
            Unbekannt
          {% elif is_state('input_boolean.sma_akku_zielzeit_dynamisch_aktiv', 'on') %}
            Dynamisch: {{ as_timestamp(ts) | timestamp_custom('%H:%M Uhr', true) }}
          {% else %}
            Manuell: {{ as_timestamp(ts) | timestamp_custom('%H:%M Uhr', true) }}
          {% endif %}

      - name: SMA Akku Ladebeginn Wirksames Ziel
        unique_id: sma_akku_ladebeginn_wirksames_ziel
        device_class: timestamp
        icon: mdi:clock-start
        state: >
          {% set soc = states('sensor.smacc_battery_soc') | float(0) %}
          {% set ziel = states('sensor.sma_akku_dynamisches_ziel_soc') | float(80) %}
          {% set benoetigt = states('sensor.sma_akku_benoetigte_ladezeit_bis_ziel') | float(99) %}
          {% set reserve = states('input_number.sma_akku_ladezeit_reserve_stunden') | float(0.5) %}
          {% set zielzeit_sensor = states('sensor.sma_akku_zielzeit_effektiv') %}
          {% set ab_str = states('input_datetime.sma_akku_ladephase_fruehestens_zeit') %}
          {% set bis_str = states('input_datetime.sma_akku_ladephase_spaetestens_zeit') %}
          {% set ladephase_ab = today_at(ab_str if ab_str not in ['unknown', 'unavailable', 'none', ''] else '11:00:00') %}
          {% set ladephase_bis = today_at(bis_str if bis_str not in ['unknown', 'unavailable', 'none', ''] else '20:00:00') %}
          {% if zielzeit_sensor in ['unknown', 'unavailable', 'none', ''] or soc >= ziel or benoetigt <= 0 or benoetigt >= 99 %}
            {{ none }}
          {% else %}
            {% set zielzeit = as_datetime(zielzeit_sensor) %}
            {% set start = zielzeit - timedelta(hours=(benoetigt + reserve)) %}
            {% if start < ladephase_ab %}
              {{ ladephase_ab.isoformat() }}
            {% elif start > ladephase_bis %}
              {{ none }}
            {% else %}
              {{ start.isoformat() }}
            {% endif %}
          {% endif %}

      - name: SMA Akku Ladebeginn Wirksames Ziel Text
        unique_id: sma_akku_ladebeginn_wirksames_ziel_text
        icon: mdi:clock-start
        state: >
          {% set ts = states('sensor.sma_akku_ladebeginn_wirksames_ziel') %}
          {% set benoetigt = states('sensor.sma_akku_benoetigte_ladezeit_bis_ziel') | float(99) %}
          {% if ts not in ['unknown', 'unavailable', 'none', ''] %}
            {{ as_timestamp(ts) | timestamp_custom('%H:%M Uhr', true) }}
          {% elif benoetigt >= 99 %}
            Nicht berechenbar - 3-Tage-Zeitschnitt ohne Ladeüberschuss
          {% else %}
            Kein Ladebeginn nötig
          {% endif %}

      - name: SMA Akku Aktuelles Ladeziel SOC
        unique_id: sma_akku_aktuelles_ladeziel_soc
        unit_of_measurement: "%"
        icon: mdi:battery-arrow-up
        state: >
          {% set ziel_mittag = states('input_number.sma_akku_ziel_mittag') | float(40) %}
          {% set ziel = states('sensor.sma_akku_dynamisches_ziel_soc') | float(80) %}
          {% set ladebeginn = states('sensor.sma_akku_ladebeginn_wirksames_ziel') %}
          {% set bis_str = states('input_datetime.sma_akku_ladephase_spaetestens_zeit') %}
          {% set ladephase_bis = today_at(bis_str if bis_str not in ['unknown', 'unavailable', 'none', ''] else '20:00:00') %}
          {% set nachtfenster = now() >= ladephase_bis or now() < today_at('05:00:00') %}
          {% if is_state('input_boolean.sma_akku_balancing_100', 'on') %}
            100
          {% elif is_state('input_boolean.sma_akku_ladephase_bis_ziel_aktiv', 'on') %}
            {{ ziel | round(0) }}
          {% elif ladebeginn not in ['unknown', 'unavailable', 'none', ''] and now() >= as_datetime(ladebeginn) %}
            {{ ziel | round(0) }}
          {% elif nachtfenster %}
            {{ ziel | round(0) }}
          {% else %}
            {{ ziel_mittag | round(0) }}
          {% endif %}

      - name: SMA Akku Aktuelles Ladeziel Grund
        unique_id: sma_akku_aktuelles_ladeziel_grund
        icon: mdi:comment-question
        state: >
          {% set ladebeginn = states('sensor.sma_akku_ladebeginn_wirksames_ziel') %}
          {% set bis_str = states('input_datetime.sma_akku_ladephase_spaetestens_zeit') %}
          {% set ladephase_bis = today_at(bis_str if bis_str not in ['unknown', 'unavailable', 'none', ''] else '20:00:00') %}
          {% set nachtfenster = now() >= ladephase_bis or now() < today_at('05:00:00') %}
          {% if is_state('input_boolean.sma_akku_balancing_100', 'on') %}
            Balancing aktiv
          {% elif is_state('input_boolean.sma_akku_ladephase_bis_ziel_aktiv', 'on') %}
            Ladephase bis Ziel aktiv
          {% elif ladebeginn not in ['unknown', 'unavailable', 'none', ''] and now() >= as_datetime(ladebeginn) %}
            Geplanter Ladebeginn erreicht
          {% elif nachtfenster %}
            Nachtfenster
          {% else %}
            Vor Ziel-Ladebeginn - nur Mittagsziel
          {% endif %}

      - name: SMA Akku Aktuelles Ladeziel Text
        unique_id: sma_akku_aktuelles_ladeziel_text
        icon: mdi:battery-arrow-up
        state: >
          {% set ziel = states('sensor.sma_akku_aktuelles_ladeziel_soc') %}
          {% set ziel_mittag = states('input_number.sma_akku_ziel_mittag') | float(40) %}
          {% set grund = states('sensor.sma_akku_aktuelles_ladeziel_grund') %}
          {% if ziel in ['unknown', 'unavailable', 'none', ''] %}
            Nicht berechenbar
          {% elif ziel | float(0) <= ziel_mittag %}
            Mittagsziel: {{ ziel }} %
          {% else %}
            Wirksames Ziel: {{ ziel }} % - {{ grund }}
          {% endif %}

      - name: SMA Akku Ladebeginn Prognose
        unique_id: sma_akku_ladebeginn_prognose
        device_class: timestamp
        icon: mdi:clock-start
        state: >
          {% set ziel = states('sensor.sma_akku_aktuelles_ladeziel_soc') | float(40) %}
          {% set soc = states('sensor.smacc_battery_soc') | float(0) %}
          {% set ts = states('sensor.sma_akku_ladebeginn_wirksames_ziel') %}
          {% if soc >= ziel %}
            {{ none }}
          {% elif ts in ['unknown', 'unavailable', 'none', ''] %}
            {{ none }}
          {% else %}
            {{ ts }}
          {% endif %}

      - name: SMA Akku Ladebeginn Prognose Text
        unique_id: sma_akku_ladebeginn_prognose_text
        icon: mdi:clock-start
        state: >
          {% set entscheidung = states('sensor.sma_akku_entscheidung_text') %}
          {% set ts = states('sensor.sma_akku_ladebeginn_prognose') %}
          {% if entscheidung in ['Unter Mittagsziel - Laden erlauben', 'Nachtfenster - Laden erlauben ohne Ladephase', 'Ladephase aktiv - Laden bis Ziel', 'Zielzeit wird knapp - Ladephase starten'] %}
            Jetzt laden - {{ entscheidung }}
          {% elif ts not in ['unknown', 'unavailable', 'none', ''] %}
            Geplant um {{ as_timestamp(ts) | timestamp_custom('%H:%M Uhr', true) }}
          {% elif entscheidung == 'Ziel erreicht - Laden sperren' %}
            Ziel erreicht - kein Ladebeginn geplant
          {% else %}
            {{ states('sensor.sma_akku_ladebeginn_wirksames_ziel_text') }}
          {% endif %}

      - name: SMA Akku Ladebeginn Uhrzeit
        unique_id: sma_akku_ladebeginn_uhrzeit
        icon: mdi:clock-start
        state: >
          {% set ts = states('sensor.sma_akku_ladebeginn_prognose') %}
          {% if ts in ['unknown', 'unavailable', 'none', ''] %}
            -
          {% else %}
            {{ as_timestamp(ts) | timestamp_custom('%H:%M Uhr', true) }}
          {% endif %}

      - name: SMA Akku Ladebeginn in Minuten
        unique_id: sma_akku_ladebeginn_in_minuten
        unit_of_measurement: "min"
        icon: mdi:timer-outline
        state: >
          {% set ts = states('sensor.sma_akku_ladebeginn_prognose') %}
          {% if ts in ['unknown', 'unavailable', 'none', ''] %}
            0
          {% else %}
            {{ [((as_timestamp(ts) - as_timestamp(now())) / 60), 0] | max | round(0) }}
          {% endif %}

      - name: SMA Akku Ziel erreicht Sperre aktiv
        unique_id: sma_akku_ziel_erreicht_sperre_aktiv
        icon: mdi:battery-lock
        state: >
          {% set soc = states('sensor.smacc_battery_soc') | float(0) %}
          {% set ziel = states('sensor.sma_akku_aktuelles_ladeziel_soc') | float(40) %}
          {{ soc >= ziel }}

      - name: SMA Akku Akku laedt trotz Sperre
        unique_id: sma_akku_akku_ladt_trotz_sperre
        icon: mdi:alert-circle
        state: >
          {% set soc = states('sensor.smacc_battery_soc') | float(0) %}
          {% set ziel = states('sensor.sma_akku_aktuelles_ladeziel_soc') | float(40) %}
          {% set charge = states('sensor.smacc_battery_charge_power') | float(0) %}
          {{ soc >= ziel and charge > 100 }}

      - name: SMA Akku Balancing Status
        unique_id: sma_akku_balancing_status
        icon: mdi:battery-sync
        state: >
          {% if is_state('input_boolean.sma_akku_balancing_100', 'on') %}
            Balancing aktiv - Ziel 100 %
          {% elif is_state('input_boolean.sma_akku_balancing_woechentlich', 'on') %}
            Automatisch geplant: {{ states('input_select.sma_akku_balancing_wochentag') }} um {{ states('input_datetime.sma_akku_balancing_startzeit') }}
          {% else %}
            Balancing aus
          {% endif %}

      - name: SMA Akku Entscheidung Text
        unique_id: sma_akku_entscheidung_text
        icon: mdi:text-box-check
        state: >
          {% set soc = states('sensor.smacc_battery_soc') | float(0) %}
          {% set ziel = states('sensor.sma_akku_aktuelles_ladeziel_soc') | float(40) %}
          {% set ziel_mittag = states('input_number.sma_akku_ziel_mittag') | float(40) %}
          {% set ladebeginn = states('sensor.sma_akku_ladebeginn_wirksames_ziel') %}
          {% set bis_str = states('input_datetime.sma_akku_ladephase_spaetestens_zeit') %}
          {% set ladephase_bis = today_at(bis_str if bis_str not in ['unknown', 'unavailable', 'none', ''] else '20:00:00') %}
          {% set nachtfenster = now() >= ladephase_bis or now() < today_at('05:00:00') %}
          {% set standby = is_state('binary_sensor.sma_akku_pv_standby_aktiv', 'on') %}
          {% if standby %}
            PV-Standby - keine Ladeoptimierung
          {% elif soc >= ziel %}
            Ziel erreicht - Laden sperren
          {% elif ziel <= ziel_mittag %}
            Unter Mittagsziel - Laden erlauben
          {% elif is_state('input_boolean.sma_akku_ladephase_bis_ziel_aktiv', 'on') %}
            Ladephase aktiv - Laden bis Ziel
          {% elif nachtfenster %}
            Nachtfenster - Laden erlauben ohne Ladephase
          {% elif ladebeginn not in ['unknown', 'unavailable', 'none', ''] and now() >= as_datetime(ladebeginn) %}
            Zielzeit wird knapp - Ladephase starten
          {% else %}
            Zielzeit komfortabel - Laden verzögern
          {% endif %}

  - binary_sensor:
      - name: SMA Akku Ladezeit reicht noch
        unique_id: sma_akku_ladezeit_reicht_noch
        icon: mdi:clock-check
        state: >
          {% set ts = states('sensor.sma_akku_ladebeginn_wirksames_ziel') %}
          {{ ts not in ['unknown', 'unavailable', 'none', ''] and now() < as_datetime(ts) }}

      - name: SMA Akku Laden soll erlaubt sein
        unique_id: sma_akku_laden_soll_erlaubt_sein
        icon: mdi:battery-charging
        state: >
          {% set entscheidung = states('sensor.sma_akku_entscheidung_text') %}
          {{ entscheidung in ['Unter Mittagsziel - Laden erlauben', 'Nachtfenster - Laden erlauben ohne Ladephase', 'Ladephase aktiv - Laden bis Ziel', 'Zielzeit wird knapp - Ladephase starten'] }}

      - name: SMA Akku PV Standby aktiv
        unique_id: sma_akku_pv_standby_aktiv
        icon: mdi:power-sleep
        delay_on:
          minutes: 10
        delay_off:
          minutes: 5
        state: >
          {% set pv = states('sensor.smacc_pv_power_total') | float(0) %}
          {% set schwelle = states('input_number.sma_akku_standby_pv_schwelle_w') | float(50) %}
          {{ pv <= schwelle }}


script:
  sma_akku_diagnose_anzeigen:
    alias: SMA Akku Diagnose anzeigen
    mode: single
    sequence:
      - service: persistent_notification.create
        data:
          title: "SMA Akku Diagnose"
          notification_id: "sma_akku_diagnose"
          message: >
            ## Status

            Zeitpunkt: {{ now().strftime('%d.%m.%Y %H:%M:%S') }}

            Entscheidung: {{ states('sensor.sma_akku_entscheidung_text') }}

            Laden soll erlaubt sein: {{ states('binary_sensor.sma_akku_laden_soll_erlaubt_sein') }}

            Ladezeit reicht noch: {{ states('binary_sensor.sma_akku_ladezeit_reicht_noch') }}

            PV-Standby aktiv: {{ states('binary_sensor.sma_akku_pv_standby_aktiv') }}

            Ladephase bis Ziel aktiv: {{ states('input_boolean.sma_akku_ladephase_bis_ziel_aktiv') }}

            Ladestatus: {{ states('input_text.sma_akku_ladestatus') }}

            Ziel-erreicht-Sperre aktiv: {{ states('sensor.sma_akku_ziel_erreicht_sperre_aktiv') }}

            Akku laedt trotz Sperre: {{ states('sensor.sma_akku_akku_ladt_trotz_sperre') }}

            Akku Ladeleistung aktuell: {{ states('sensor.smacc_battery_charge_power') }} W


            ## Ladebeginn / Zielzeit

            Prognose Text: {{ states('sensor.sma_akku_ladebeginn_prognose_text') }}

            Ladebeginn Uhrzeit: {{ states('sensor.sma_akku_ladebeginn_uhrzeit') }}

            Ladebeginn Wirksames Ziel: {{ states('sensor.sma_akku_ladebeginn_wirksames_ziel_text') }}

            Ladebeginn Minuten: {{ states('sensor.sma_akku_ladebeginn_in_minuten') }}

            Ladefenster frühestens ab: {{ states('input_datetime.sma_akku_ladephase_fruehestens_zeit') }}

            Ladefenster spätestens bis: {{ states('input_datetime.sma_akku_ladephase_spaetestens_zeit') }}

            Ziel-SOC erreicht bis manuell: {{ states('input_datetime.sma_akku_ziel_erreicht_zeit') }}

            Zielzeit dynamisch aktiv: {{ states('input_boolean.sma_akku_zielzeit_dynamisch_aktiv') }}

            Effektive Zielzeit: {{ states('sensor.sma_akku_zielzeit_effektiv_text') }}

            Zielzeit Puffer vor PV-Ende: {{ states('input_number.sma_akku_zielzeit_puffer_vor_pv_ende_minuten') }} min


          {% set standard = states('input_number.sma_akku_ziel_tagesende') | float(80) %}
          {% set nacht = states('sensor.sma_akku_nachtziel_soc') | float(0) %}
          {% set morgen = states('sensor.sma_akku_pv_forecast_morgen_gesamt') | float(0) %}
          {% set schw_mittel = states('input_number.sma_akku_morgen_forecast_schwelle_mittel') | float(25) %}
          {% set schw_schlecht = states('input_number.sma_akku_morgen_forecast_schwelle_schlecht') | float(15) %}
          {% set ziel_mittel = states('input_number.sma_akku_ziel_morgen_mittel') | float(90) %}
          {% set ziel_schlecht = states('input_number.sma_akku_ziel_morgen_schlecht') | float(95) %}
          {% if is_state('input_boolean.sma_akku_balancing_100', 'on') %}
            100
          {% else %}
            {% if is_state('input_boolean.sma_akku_nachtziel_aktiv', 'on') and nacht > 0 %}
              {% set basis = nacht %}
            {% else %}
              {% set basis = standard %}
            {% endif %}
            {% set morgen_ziel = 0 %}
            {% if is_state('input_boolean.sma_akku_morgen_forecast_aktiv', 'on') and morgen > 0 and morgen < schw_schlecht %}
              {% set morgen_ziel = ziel_schlecht %}
            {% elif is_state('input_boolean.sma_akku_morgen_forecast_aktiv', 'on') and morgen > 0 and morgen < schw_mittel %}
              {% set morgen_ziel = ziel_mittel %}
            {% endif %}

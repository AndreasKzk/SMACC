      - name: SMA Akku Schonladen Ladeleistung wirksam
        unique_id: sma_akku_schonladen_ladeleistung_wirksam
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:slope-downhill
        state: >
          {% set max_helper = states('input_number.sma_akku_schonladen_ladeleistung_max') | float(0) %}
          {% set max_ladung = max_helper if max_helper > 0 else states('input_number.sma_akku_ladeleistung_max') | float(10600) %}
          {% set grenze = states('sensor.sma_akku_schonladen_ladegrenze_aktiv') | float(max_ladung) %}
          {{ [[grenze, 0] | max, max_ladung] | min | round(0) }}

      - name: SMA Akku Schonladen Status
        unique_id: sma_akku_schonladen_status
        icon: mdi:information-outline
        state: >
          {% set vmax = states('sensor.smacc_byd_max_cell_voltage_mv') | float(0) %}
          {% set start = states('input_number.sma_akku_schonladen_spannung_start_mv') | float(3430) %}
          {% set reset = states('input_number.sma_akku_schonladen_spannung_reset_mv') | float(3370) %}
          {% set max_helper = states('input_number.sma_akku_schonladen_ladeleistung_max') | float(0) %}
          {% set max_ladung = max_helper if max_helper > 0 else states('input_number.sma_akku_ladeleistung_max') | float(10600) %}
          {% set grenze = states('sensor.sma_akku_schonladen_ladegrenze_aktiv') | float(max_ladung) %}
          {% set min_limit = states('sensor.sma_akku_schonladen_ladeleistung_obenrum') | float(0) %}
          {% if grenze < max_ladung - 50 %}
            Spannungsbremse aktiv
          {% elif vmax >= start %}
            Spannungsgrenze erreicht - Absenkung bereit
          {% elif vmax <= reset %}
            Spannungsbremse aufgehoben
          {% elif min_limit > 0 %}
            Schonladen frei
          {% else %}
            Schonladen unklar
          {% endif %}

